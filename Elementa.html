                    let base64 = "";
                    if (previewFile && previewFile.originalFile) {
                        if(previewFile.originalFile.size > 8 * 1024 * 1024) { setErrorMsg("Archivo muy pesado (Máximo 8MB)."); setLoading(false); setSuccessMsg(''); return; }
                        base64 = await getBase64(previewFile.originalFile);
                    }
                    
                    let res;
                    if (uploadingReto.isSkillUpdate) {
                        res = await apiCall('updateSkillsWithEvidence', {
                            correo: user.correo || user.email, skills: userSkills, base64: base64, filename: previewFile?.originalFile?.name || 'evidencia'
                        });
                    } else {
                        res = await apiCall('submitEvidence', {
                            correo: user.correo || user.email, reto: uploadingReto.Titulo, puntos: uploadingReto.Puntos, base64: base64, filename: previewFile?.originalFile?.name || 'evidencia'
                        });
                    }

                    if (res.status === 'success') {
                        setSuccessMsg(res.message || 'Evidencia enviada a revisión.');
                        setTimeout(() => { setUploadingReto(null); setPreviewFile(null); setSuccessMsg(''); loadAppData(user); }, 3000);
                    } else { setErrorMsg(res.message || 'Error al subir la evidencia.'); setSuccessMsg(''); }
                } catch(e) { setErrorMsg("Error al procesar el archivo."); setSuccessMsg(''); }
                setLoading(false);
            };

            const completeVideoChallenge = async () => {
                setLoading(true);
                const res = await apiCall('submitEvidence', { correo: user.correo || user.email, reto: `Ver video: ${selectedVideo.Nombre || 'Academia'}`, puntos: 1, base64: '', filename: '' });
                if (res.status === 'success') {
                    setSuccessMsg('Puntos solicitados exitosamente.');
                    setTimeout(() => { setSelectedVideo(null); setSuccessMsg(''); loadAppData(user); }, 2000);
                } else { setErrorMsg(res.message); }
                setLoading(false);
            };

            const handleSkillUpdate = (movimiento, valor) => { setUserSkills(prev => ({...prev, [movimiento]: valor})); };

            const handleAdminValidateEvidence = async (e) => {
                e.preventDefault(); setLoading(true);
                const estado = e.target.decision.value;
                const observacion = e.target.observacion.value;
                if (estado === 'Rechazado' && !observacion) { alert("Debe seleccionar una observación para rechazar."); setLoading(false); return; }
                const res = await apiCall('evaluateEvidence', { rowIndex: adminEvalEvidencia._rowIndex, estado: estado, observacion: observacion, puntos: estado === 'Aprobado' ? adminEvalEvidencia.Puntos : 0, correo: adminEvalEvidencia.Correo });
                if (res.status === 'success') { setAdminEvalEvidencia(null); loadAppData(user); } else { alert(res.message); }
                setLoading(false);
            };

            const handlePaymentUpdate = async (e) => {
                e.preventDefault(); setLoading(true);
                const formData = new FormData(e.target);
                const res = await apiCall('updatePayment', { rowIndex: editingPayment._rowIndex, data: Object.fromEntries(formData.entries()) });
                if (res.status === 'success') { setSuccessMsg('Actualizado correctamente.'); setTimeout(() => { setSuccessMsg(''); setEditingPayment(null); loadAppData(user); }, 1500); } else { setErrorMsg(res.message); }
                setLoading(false);
            };

            const handleAdminAddBlog = async (e) => {
                e.preventDefault(); setLoading(true); setSuccessMsg('Publicando...');
                const formData = new FormData(e.target);
                const res = await apiCall('addBlog', Object.fromEntries(formData.entries()));
                if (res.status === 'success') { setSuccessMsg('Publicado.'); e.target.reset(); setTimeout(() => { setSuccessMsg(''); loadAppData(user); }, 1500); } 
                else { setErrorMsg(res.message); setTimeout(() => setErrorMsg(''), 3000); }
                setLoading(false);
            };

            const calcularDias = (fechaCaducidad) => {
                if (!fechaCaducidad) return { texto: 'Sin fecha', color: 'text-brand-dark/50' };
                const expDate = new Date(fechaCaducidad);
                if(isNaN(expDate.getTime())) return { texto: 'Inválida', color: 'text-brand-dark/50' };
                const utcDate = new Date(expDate.getTime() + expDate.getTimezoneOffset() * 60000);
                const today = new Date().setHours(0,0,0,0); utcDate.setHours(0,0,0,0);
                const diffDays = Math.ceil((utcDate - today) / (1000 * 60 * 60 * 24));
                if (diffDays < 0) return { texto: `Vencido hace ${Math.abs(diffDays)} días`, color: 'text-red-600' };
                if (diffDays === 0) return { texto: 'Vence HOY', color: 'text-orange-600' };
                if (diffDays <= 5) return { texto: `Vence en ${diffDays} días`, color: 'text-orange-500' };
                return { texto: `${diffDays} días restantes`, color: 'text-green-600' };
            };

            const groupedFilteredVideos = useMemo(() => {
                const lowerSearch = String(searchTerm || '').toLowerCase();
                const filtered = videos?.filter(v => String(v?.Nombre || '').toLowerCase().includes(lowerSearch) || String(v?.Descripcion || '').toLowerCase().includes(lowerSearch)) || [];
                return filtered.reduce((acc, v) => {
                    const cat = v?.Categoria || 'General';
                    if (!acc[cat]) acc[cat] = []; acc[cat].push(v); return acc;
                }, {});
            }, [videos, searchTerm]);

            const toggleCategory = (cat) => setExpandedCategories(prev => ({ ...prev, [cat]: !prev[cat] }));

            const Topbar = () => (
                <div className="sticky top-0 z-[100] bg-brand-bg1/95 backdrop-blur-xl px-6 py-4 flex justify-between items-center shadow-sm border-b border-brand-dark/10">
                    <div className="flex items-center gap-2">
                        <div className="bg-brand-dark p-2 rounded-lg shadow-lg"><ElementaLogo className="w-6 h-6 text-brand-bg1" /></div>
                        <span className="font-black text-xl tracking-widest uppercase text-brand-dark">Elementa</span>
                    </div>
                    {user && (
                        <button onClick={handleLogout} className="flex items-center gap-2 px-3 py-1.5 rounded-full hover:bg-black/5 transition-colors text-brand-dark/80 font-bold text-xs uppercase tracking-wider">
                            Salir <LogOut className="w-4 h-4" />
                        </button>
                    )}
                </div>
            );

            // ==========================================
            // TARJETA FLOTANTE Y REDISEÑADA
            // ==========================================
            const ProfileSuperCard = () => (
                <div className="sticky top-[76px] z-[90] glass-card rounded-[1.5rem] p-5 flex flex-col gap-5 border border-white/60 shadow-lg mb-6 transition-all">
                    <div className="flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-14 h-14 bg-brand-dark text-brand-bg1 rounded-full flex items-center justify-center font-black text-2xl shadow-lg ring-2 ring-brand-bg1/30">
                                {String(user.name || 'E').charAt(0).toUpperCase()}
                            </div>
                            <div className="flex flex-col">
                                <h2 className="text-xl font-black uppercase leading-none text-brand-dark tracking-tight">
                                    {user.name} {user.apellidos || ''}
                                </h2>
                                <div className="flex items-center gap-1.5 mt-1.5 flex-wrap">
                                    <span className="text-[10px] bg-black/5 px-2 py-0.5 rounded font-black uppercase text-brand-dark/60 border border-brand-dark/10 shadow-inner">{user.plan || 'Sin Plan'}</span>
                                    <span className={`text-[10px] px-2 py-0.5 rounded font-black uppercase shadow-sm ${String(user.status || '').trim().toLowerCase() === 'activo' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-red-100 text-red-700 border border-red-200'}`}>{user.status}</span>
                                </div>
                            </div>
                        </div>
                        
                        <button onClick={() => handleNavigation('ranking')} className="bg-brand-bg2 hover:bg-brand-dark hover:text-brand-bg1 transition-colors text-brand-dark px-4 py-2 rounded-xl flex flex-col items-center shadow-sm border border-brand-dark/10 cursor-pointer group shrink-0">
                            <span className="font-black text-2xl leading-none group-hover:scale-110 transition-transform">{misPuntos}</span>
                            <span className="text-[9px] font-black uppercase tracking-widest mt-1 opacity-80 flex items-center gap-1"><Trophy className="w-3 h-3"/> Puntos</span>
                        </button>
                    </div>

                    {!String(user.plan || '').includes('12 Clases') ? (
                        <div className="flex gap-3 w-full">
                            <div className="flex-1 bg-green-500/10 border border-green-500/20 rounded-xl p-2.5 flex items-center justify-center sm:justify-start gap-2 shadow-sm">
                                <Clock className="w-4 h-4 text-green-700 opacity-70 hidden sm:block"/>
                                <div className="flex flex-col items-center sm:items-start">
                                    <span className="text-[9px] font-black uppercase text-green-700/60 leading-none mb-0.5">Ingreso</span>
                                    <span className="text-xs font-black text-green-800 leading-none tracking-wide">{formatearFecha(user.ingreso)}</span>
                                </div>
                            </div>
                            <div className="flex-1 bg-red-500/10 border border-red-500/20 rounded-xl p-2.5 flex items-center justify-center sm:justify-start gap-2 shadow-sm">
                                <AlertCircle className="w-4 h-4 text-red-700 opacity-70 hidden sm:block"/>
                                <div className="flex flex-col items-center sm:items-start">
                                    <span className="text-[9px] font-black uppercase text-red-700/60 leading-none mb-0.5">Vencimiento</span>
                                    <span className="text-xs font-black text-red-800 leading-none tracking-wide">{formatearFecha(user.caducidad)}</span>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-brand-dark/5 rounded-xl p-3 flex justify-center items-center text-xs font-black text-brand-dark border border-brand-dark/10 shadow-sm">
                            <span className="flex items-center gap-2"><Clock className="w-4 h-4"/> Tienes <strong className="text-lg mx-1">{user.diasRestantes || 0}</strong> clases restantes</span>
                        </div>
                    )}
                </div>
            );

            // Se agregó un Z-index gigante [9999] para que nada lo oculte
            const BottomNav = () => (
                <div className="fixed bottom-4 left-1/2 -translate-x-1/2 w-[95%] max-w-md bg-brand-dark backdrop-blur-lg p-2 rounded-full shadow-2xl flex justify-between items-center z-[9999] border-2 border-brand-bg2">
                    {['home', 'wod', 'academy', 'blog'].map(view => {
                        const isApp = currentView === view;
                        const icons = { home: Home, wod: Calendar, academy: Video, blog: BookOpen };
                        const labels = { home: 'Home', wod: 'WOD', academy: 'Academia', blog: 'Eventos' };
                        const Icon = icons[view];
                        return (
                            <button key={view} onClick={() => handleNavigation(view)} className={`relative flex items-center justify-center p-3 rounded-full transition-all duration-300 ${isApp ? 'bg-brand-bg1 text-brand-dark shadow-md' : 'text-white hover:text-white/80 flex-1'}`}>
                                <Icon className="w-5 h-5" />
                                {isApp && <span className="ml-1.5 text-xs font-black uppercase tracking-wider animate-fade-in">{labels[view]}</span>}
                            </button>
                        );
                    })}
                    {user?.role === 'admin' && (
                        <button onClick={() => handleNavigation('admin')} className={`relative flex items-center justify-center p-3 rounded-full transition-all duration-300 ${currentView === 'admin' ? 'bg-brand-bg1 text-brand-dark shadow-md' : 'text-white hover:text-white/80 flex-1'}`}>
                            <Database className="w-5 h-5" />
                            {currentView === 'admin' && <span className="ml-1.5 text-xs font-black uppercase tracking-wider animate-fade-in">Admin</span>}
                        </button>
                    )}
                </div>
            );

            return (
                <div className="pb-32">
                    <style dangerouslySetInnerHTML={{ __html: customStyles }} />

                    {(user || currentView !== 'login') && <Topbar />}

                    <div className="max-w-4xl mx-auto px-4 pt-6">
                        
                        {/* PROFILE CARD FLOTANTE EN TODAS LAS VISTAS (MENOS RANKING/LOGIN) */}
                        {user && currentView !== 'login' && currentView !== 'register' && currentView !== 'ranking' && <ProfileSuperCard />}

                        {/* LOGIN Y REGISTRO */}
                        {!user && (currentView === 'login' || currentView === 'register') && (
                            <div className="flex flex-col items-center justify-center animate-slide-up py-10">
                                <div className="mb-8 flex flex-col items-center">
                                    <div className="w-24 h-24 rounded-full bg-brand-dark flex items-center justify-center shadow-2xl mb-4 border-4 border-brand-dark/10"><ElementaLogo className="w-16 h-16 text-brand-bg1" /></div>
                                    <h1 className="text-4xl font-black uppercase tracking-widest text-brand-dark drop-shadow-sm">Elementa</h1>
                                    <h2 className="text-xl font-medium tracking-[0.4em] text-brand-dark/70">TRAINING BOX</h2>
                                </div>
                                
                                <div className="glass-card p-6 sm:p-8 rounded-[2.5rem] w-full max-w-md">
                                    <h3 className="text-2xl font-black mb-6 text-center">{currentView === 'login' ? 'Iniciar Sesión' : 'Registro de Atleta'}</h3>
                                    
                                    {errorMsg && <div className="bg-red-500/10 text-red-700 p-3 rounded-xl mb-6 text-sm font-bold text-center border border-red-500/20">{errorMsg}</div>}
                                    {successMsg && <div className="bg-green-500/10 text-green-700 p-3 rounded-xl mb-6 text-sm font-bold text-center border border-green-500/20">{successMsg}</div>}
                                    
                                    <form id="loginForm" onSubmit={currentView === 'login' ? handleAuth : handleRegister} className="space-y-4">
                                        {currentView === 'register' && (
                                            <div className="h-64 overflow-y-auto hide-scroll space-y-4 px-1 pb-4">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Nombres</label><input type="text" name="nombres" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                    <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Apellidos</label><input type="text" name="apellidos" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Cédula</label><input type="number" name="cedula" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                    <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Teléfono</label><input type="tel" name="telefono" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">EPS</label><input type="text" name="eps" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                    <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Fecha Nacimiento</label><input type="date" name="fechaNac" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                </div>
                                                <div className="p-4 bg-brand-dark/5 rounded-xl border border-brand-dark/10 space-y-4 mt-2">
                                                    <p className="text-[10px] font-black uppercase text-brand-dark/50 flex items-center gap-1"><AlertCircle className="w-3 h-3"/> En caso de emergencia</p>
                                                    <input type="text" name="contactoEmergencia" required placeholder="Nombre y Teléfono del contacto" className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark text-sm" />
                                                    <input type="text" name="parentesco" required placeholder="Parentesco (Ej: Madre, Pareja)" className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark text-sm" />
                                                </div>
                                                <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark mt-2">Correo Electrónico</label><input type="email" name="correo" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                            </div>
                                        )}
                                        
                                        {currentView === 'login' && (
                                            <>
                                                <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Cédula</label><input type="number" name="cedula" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark tracking-wider" placeholder="Número de Documento" /></div>
                                            </>
                                        )}

                                        <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Contraseña</label><input type="password" name="password" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" placeholder="Tu contraseña" /></div>
                                        
                                        <button type="submit" disabled={loading} className="w-full bg-brand-dark text-brand-bg1 p-4 rounded-xl font-black text-lg mt-2 hover:scale-[1.02] transition-transform shadow-xl">
                                            {loading ? 'Cargando...' : (currentView === 'login' ? 'Entrar al Box' : 'Crear Mi Cuenta')}
                                        </button>
                                    </form>

                                    <div className="mt-6 text-center">
                                        <button onClick={() => setCurrentView(currentView === 'login' ? 'register' : 'login')} className="text-xs font-bold text-brand-dark/80 hover:text-brand-dark underline decoration-2 underline-offset-4">
                                            {currentView === 'login' ? 'Soy nuevo, quiero registrarme' : 'Ya tengo cuenta, iniciar sesión'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* HOME: SKILLS / HABILIDADES */}
                        {user && currentView === 'home' && (
                            <div className="animate-slide-up space-y-4">
                                {errorMsg && <div className="bg-red-500/10 text-red-700 p-3 rounded-xl text-sm font-bold text-center border border-red-500/20">{errorMsg}</div>}
                                {successMsg && <div className="bg-green-500 text-white p-3 rounded-xl text-sm font-bold text-center shadow-lg animate-pulse">{successMsg}</div>}

                                <div className="flex gap-2 overflow-x-auto hide-scroll pb-2 mt-4">
                                    <button onClick={() => setSkillTab('gimnasia')} className={`flex-1 py-3 rounded-xl font-black uppercase text-sm transition-all shadow-sm ${skillTab === 'gimnasia' ? 'bg-brand-dark text-brand-bg1' : 'bg-white/50 text-brand-dark hover:bg-white border border-brand-dark/5'}`}>Gimnasia</button>
                                    <button onClick={() => setSkillTab('levantamientos')} className={`flex-1 py-3 rounded-xl font-black uppercase text-sm transition-all shadow-sm ${skillTab === 'levantamientos' ? 'bg-brand-dark text-brand-bg1' : 'bg-white/50 text-brand-dark hover:bg-white border border-brand-dark/5'}`}>Levantamientos</button>
                                </div>

                                <div className="glass-card rounded-[1.5rem] p-4 sm:p-6 border border-white/40 shadow-sm mt-2 mb-6">
                                    {skillTab === 'gimnasia' && (
                                        <div className="space-y-4 animate-fade-in">
                                            <div className="flex items-center gap-2 mb-2">
                                                <Target className="w-6 h-6 text-brand-dark"/>
                                                <h3 className="font-black text-xl uppercase tracking-wider text-brand-dark">Gimnasia</h3>
                                            </div>
                                            <p className="text-[10px] font-bold text-brand-dark/60 bg-white/50 p-3 rounded-xl leading-tight">Tu récord oficial es la base. Si solicitas validar una banda de mayor dificultad, requerirá una evidencia fotográfica o en video.</p>
                                            
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4">
                                                {movimientosGimnasia.map((mov, idx) => (
                                                    <div key={idx} className="bg-white/60 p-3.5 sm:p-4 rounded-2xl border border-brand-dark/10 shadow-sm flex flex-col gap-3">
                                                        <div className="flex justify-between items-center">
                                                            <h4 className="font-black text-xs text-brand-dark uppercase tracking-wider">{mov}</h4>
                                                            {maxSkills[mov] && maxSkills[mov] !== 'azul' && (
                                                                <span className="text-[8px] font-black uppercase tracking-widest text-brand-dark/40 bg-black/5 px-2 py-0.5 rounded">PR Oficial: {nivelesGimnasiaList.find(n => n.color === maxSkills[mov])?.label || 'Banda Azul'}</span>
                                                            )}
                                                        </div>
                                                        <div className="flex items-center justify-between bg-black/5 p-2 rounded-full border border-black/5">
                                                            {nivelesGimnasiaList.map(nv => {
                                                                const isActive = userSkills[mov] === nv.color;
                                                                return (
                                                                <button 
                                                                    key={nv.color}
                                                                    onClick={() => handleSkillUpdate(mov, nv.color)}
                                                                    className={`w-7 h-7 sm:w-8 sm:h-8 rounded-full border-2 transition-all duration-300 relative group flex items-center justify-center
                                                                        ${isActive ? `color-${nv.color} videogame-active` : `color-${nv.color} opacity-40 hover:opacity-100 grayscale hover:grayscale-0 border-transparent hover:scale-110`}`}
                                                                    title={`${nv.nivel}: ${nv.label}`}
                                                                >
                                                                    {isActive && <CheckCircle className="w-4 h-4 text-white drop-shadow-md z-20 absolute"/>}
                                                                </button>
                                                            )})}
                                                        </div>
                                                        <div className="text-[9px] font-black text-center uppercase tracking-widest text-brand-dark/50">
                                                            Nivel a Solicitar: {userSkills[mov] ? nivelesGimnasiaList.find(n => n.color === userSkills[mov])?.label : 'Sin Nivel'}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {skillTab === 'levantamientos' && (
                                        <div className="space-y-4 animate-fade-in">
                                            <div className="flex items-center gap-2 mb-2">
                                                <Dumbbell className="w-6 h-6 text-brand-dark"/>
                                                <h3 className="font-black text-xl uppercase tracking-wider text-brand-dark">Levantamientos</h3>
                                            </div>
                                            <p className="text-[10px] font-bold text-brand-dark/60 bg-white/50 p-3 rounded-xl leading-tight">Si rompes tu PR oficial (+5lb o más), solicita validación para tus puntos subiendo tu video aquí.</p>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4">
                                                {movimientosLevantamiento.map((mov, idx) => (
                                                    <div key={idx} className="bg-white/60 p-4 rounded-2xl border border-brand-dark/10 flex items-center justify-between gap-3 shadow-sm hover:bg-white/80 transition-colors flex-wrap">
                                                        <div className="flex flex-col flex-1">
                                                            <h4 className="font-black text-xs text-brand-dark uppercase tracking-wider leading-tight">{mov}</h4>
                                                            <span className="text-[9px] font-black text-brand-dark/40 uppercase mt-0.5">PR Oficial: {maxSkills[mov] || 0} LBS</span>
                                                        </div>
                                                        <div className="flex items-center gap-1 w-24 sm:w-28 bg-white p-1 rounded-xl border border-brand-dark/20 focus-within:border-brand-dark/60 transition-colors shadow-inner shrink-0">
                                                            <input 
                                                                type="number" 
                                                                placeholder="0" 
                                                                value={userSkills[mov] !== undefined ? userSkills[mov] : ''}
                                                                onChange={(e) => handleSkillUpdate(mov, e.target.value)}
                                                                className="w-full p-2 bg-transparent outline-none font-black text-center text-brand-dark text-lg sm:text-xl" 
                                                            />
                                                            <span className="text-[8px] font-black uppercase text-brand-dark/50 pr-2">LBS</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    
                                    <button onClick={handleActualizarSkillsClick} disabled={loading} className="w-full mt-6 bg-brand-dark text-brand-bg1 p-4 rounded-xl font-black uppercase text-sm shadow-xl hover:scale-[1.02] transition-transform flex items-center justify-center gap-2">
                                        {loading ? 'Validando Progreso...' : <><Upload className="w-5 h-5"/> Actualizar Mi Progreso</>}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* RANKING GLOBAL */}
                        {user && currentView === 'ranking' && (
                            <div className="animate-slide-up space-y-6">
                                <div className="px-2 flex items-center justify-between mt-4">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-brand-dark p-3 rounded-xl shadow-lg"><Trophy className="w-8 h-8 text-yellow-400" /></div>
                                        <div>
                                            <h2 className="text-3xl font-black uppercase leading-none text-brand-dark">Ranking</h2>
                                            <p className="text-xs font-bold text-brand-dark/50 tracking-wider">Top de Atletas Elementa</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setCurrentView('home')} className="bg-white/50 p-3 rounded-full hover:bg-white text-brand-dark shadow-sm"><X className="w-5 h-5"/></button>
                                </div>

                                <div className="glass-card rounded-[1.5rem] p-4 sm:p-6 border border-white/40 shadow-sm">
                                    <div className="space-y-3">
                                        {[...rankingList].sort((a,b) => b.puntos - a.puntos).map((r, i) => {
                                            const isMe = r.nombre === (`${user.name || ''} ${user.apellidos || ''}`).trim();
                                            return (
                                                <div key={i} className={`flex items-center justify-between p-4 rounded-2xl transition-all ${isMe ? 'bg-brand-dark text-brand-bg1 shadow-lg scale-[1.02] ring-2 ring-brand-dark/20' : 'bg-white/60 text-brand-dark border border-brand-dark/10'}`}>
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-8 h-8 flex items-center justify-center font-black text-sm rounded-full ${i === 0 ? 'bg-yellow-400 text-yellow-900 shadow-md' : (i === 1 ? 'bg-gray-300 text-gray-800' : (i === 2 ? 'bg-orange-300 text-orange-900' : 'bg-black/10'))}`}>
                                                            {i + 1}
                                                        </div>
                                                        <span className="font-black text-sm uppercase tracking-wide">{r.nombre}</span>
                                                    </div>
                                                    <div className="flex flex-col items-end">
                                                        <span className="font-black text-lg leading-none">{r.puntos}</span>
                                                        <span className="text-[8px] font-black uppercase tracking-widest opacity-60">Pts</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {rankingList.length === 0 && <p className="text-center font-bold text-sm text-brand-dark/50 py-4">No hay datos de ranking aún.</p>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* WOD Y RETOS */}
                        {user && currentView === 'wod' && (
                            <div className="animate-slide-up space-y-6">
                                <div className="px-2 mt-4">
                                    <h2 className="text-4xl font-black uppercase leading-none mt-1">WOD</h2>
                                    <p className="text-sm font-bold text-brand-dark/50 mt-2">Entrenamientos y Retos</p>
                                </div>

                                {dataLoading ? <Loader /> : (
                                    <div className="space-y-6">
                                        {(!wodsList || wodsList.length === 0) ? (
                                            <div className="bg-white/40 p-6 rounded-2xl border border-brand-dark/10 text-center shadow-sm">
                                                <Calendar className="w-10 h-10 mx-auto text-brand-dark/30 mb-3" />
                                                <p className="font-bold text-brand-dark/60 text-sm">No hay entrenamientos cargados.</p>
                                                {user?.role === 'admin' && <p className="text-[10px] mt-2 text-brand-dark/40 font-black">Admin: Crea una pestaña llamada 'WODS' en el archivo Excel con las columnas: Titulo, Fecha y Descripcion.</p>}
                                            </div>
                                        ) : (
                                            wodsList.map((wod, idx) => (
                                                <div key={idx} className="glass-card rounded-[1.5rem] p-6 border border-brand-dark/10 shadow-md relative overflow-hidden group">
                                                    <div className="absolute top-0 left-0 w-2 h-full bg-brand-dark"></div>
                                                    <div className="flex justify-between items-start mb-4">
                                                        <h3 className="text-2xl font-black uppercase text-brand-dark">{wod?.Titulo || 'WOD'}</h3>
                                                        <span className="text-xs font-bold text-brand-dark/50 bg-white/50 px-3 py-1 rounded-full">{formatearFecha(wod?.Fecha)}</span>
                                                    </div>
                                                    <div className="bg-white/40 p-5 rounded-xl font-medium text-brand-dark/90 whitespace-pre-wrap leading-relaxed border border-white/50 text-sm">
                                                        {wod?.Descripcion || 'Sin descripción'}
                                                    </div>
                                                </div>
                                            ))
                                        )}

                                        <div className="pt-4 border-t-2 border-brand-dark/10">
                                            <h3 className="font-black text-xl uppercase mb-4 px-2 flex items-center gap-2"><Trophy className="w-5 h-5"/> Retos Disponibles</h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                {retosList?.map((reto, idx) => {
                                                    if(!reto) return null;
                                                    return (
                                                    <div key={idx} className="bg-white/60 p-5 rounded-2xl border border-brand-dark/5 flex flex-col h-full shadow-sm">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <h4 className="font-black uppercase text-sm leading-tight text-brand-dark">{reto?.Titulo || 'Reto'}</h4>
                                                            <span className="bg-green-100 text-green-700 font-black text-[10px] px-2 py-1 rounded-full uppercase tracking-wider border border-green-200">+{reto?.Puntos || 0} Pts</span>
                                                        </div>
                                                        <p className="text-xs font-bold text-brand-dark/60 mb-4 flex-1 leading-relaxed">{reto?.Descripcion || ''}</p>
                                                        <button onClick={() => setUploadingReto(reto)} className="w-full bg-brand-dark text-brand-bg1 py-2.5 rounded-xl font-black text-[10px] uppercase shadow-md flex items-center justify-center gap-2 hover:scale-[1.02] transition-transform">
                                                            <Upload className="w-4 h-4"/> Subir Evidencia
                                                        </button>
                                                    </div>
                                                )})}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ACADEMIA DE VIDEOS */}
                        {user && currentView === 'academy' && (
                            <div className="animate-slide-up space-y-6">
                                <div className="px-2 mt-4">
                                    <h2 className="text-4xl font-black uppercase leading-none mt-1">Academia</h2>
                                    <p className="text-sm font-bold text-brand-dark/50 mt-2">Domina tu técnica con nuestros videos</p>
                                </div>
                                <div className="relative">
                                    <Search className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-brand-dark/50" />
                                    <input type="text" placeholder="Buscar movimiento..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-12 pr-4 py-4 rounded-2xl bg-white/60 focus:bg-white outline-none transition-all shadow-inner font-bold text-brand-dark" />
                                </div>
                                {dataLoading ? <Loader /> : (
                                    <div className="space-y-4">
                                        {Object.keys(groupedFilteredVideos).map((category, catIdx) => (
                                            <div key={catIdx} className="glass-card rounded-[1.5rem] overflow-hidden border border-white/40 shadow-sm">
                                                <button onClick={() => toggleCategory(category)} className="w-full p-5 flex justify-between items-center hover:bg-white/40 transition-colors">
                                                    <div className="flex items-center gap-3">
                                                        <div className="bg-brand-dark text-brand-bg1 w-8 h-8 rounded-full flex items-center justify-center font-black text-sm shadow-inner">{groupedFilteredVideos[category].length}</div>
                                                        <h3 className="font-black text-lg uppercase tracking-wider">Categoría {category}</h3>
                                                    </div>
                                                    {expandedCategories[category] ? <ChevronUp className="w-5 h-5 opacity-50"/> : <ChevronDown className="w-5 h-5 opacity-50"/>}
                                                </button>
                                                {expandedCategories[category] && (
                                                    <div className="p-4 sm:p-6 grid grid-cols-1 sm:grid-cols-2 gap-6 bg-black/5 animate-fade-in border-t border-white/20">
                                                        {groupedFilteredVideos[category].map((vid, vIdx) => {
                                                            const videoInfo = getVideoData(vid?.URL || '');
                                                            return (
                                                                <div key={vIdx} onClick={() => setSelectedVideo({ ...videoInfo, Nombre: vid?.Nombre })} className="bg-white rounded-3xl overflow-hidden shadow-sm cursor-pointer hover:shadow-xl hover:-translate-y-1 transition-all duration-300 border border-brand-dark/5 flex flex-col group relative">
                                                                    <div className="relative aspect-video bg-brand-dark flex items-center justify-center overflow-hidden">
                                                                        {videoInfo.type === 'youtube' ? (
                                                                            <img src={`https://img.youtube.com/vi/${videoInfo.id}/hqdefault.jpg`} className="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-500 group-hover:scale-105" alt={vid?.Nombre || ''} />
                                                                        ) : (
                                                                            <Video className="w-12 h-12 text-white/30" />
                                                                        )}
                                                                        <div className="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-300"></div>
                                                                        <div className="relative z-10 w-16 h-16 bg-brand-bg1/95 rounded-full flex items-center justify-center shadow-xl backdrop-blur-md group-hover:scale-110 group-hover:bg-brand-bg1 transition-all duration-300">
                                                                            <Play className="w-8 h-8 text-brand-dark translate-x-0.5" />
                                                                        </div>
                                                                    </div>
                                                                    <div className="p-5 flex-1 flex flex-col">
                                                                        <h4 className="font-black text-xl leading-tight uppercase mb-2 text-brand-dark">{vid?.Nombre || ''}</h4>
                                                                        <p className="text-sm text-brand-dark/70 font-medium line-clamp-2 mt-auto">{vid?.Descripcion || ''}</p>
                                                                    </div>
                                                                </div>
                                                            )
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* BLOG / EVENTOS */}
                        {user && currentView === 'blog' && (
                            <div className="animate-slide-up space-y-6">
                                <div className="px-2 mt-4">
                                    <h2 className="text-4xl font-black uppercase leading-none mt-1">Eventos</h2>
                                    <p className="text-sm font-bold text-brand-dark/50 mt-2">Actividades extraordinarias y comunidad</p>
                                </div>
                                {dataLoading ? <Loader /> : (
                                    <div className="grid grid-cols-1 gap-8">
                                        {blogPosts?.map((post, idx) => {
                                            if(!post) return null;
                                            return (
                                                <div key={idx} onClick={() => setSelectedPost({...post})} className="glass-card rounded-[2rem] overflow-hidden group hover:shadow-2xl transition-all duration-300 relative cursor-pointer flex flex-col border border-white/40">
                                                    {post?.URL_Imagen && (
                                                        <div className="h-48 sm:h-72 w-full relative overflow-hidden bg-brand-dark">
                                                            <img src={post.URL_Imagen} className="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 opacity-90" alt="News" />
                                                        </div>
                                                    )}
                                                    <div className="p-6 bg-white/40 flex-1 flex flex-col">
                                                        <div className="flex justify-between items-start mb-3">
                                                            <span className="bg-brand-dark text-brand-bg1 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider">{post?.Etiqueta || 'Evento'}</span>
                                                            <span className="text-[10px] font-bold text-brand-dark/50 uppercase">{formatearFecha(post?.Fecha)}</span>
                                                        </div>
                                                        <h3 className="text-2xl font-black leading-tight mb-2">{post?.Titulo || ''}</h3>
                                                        <p className="font-medium text-brand-dark/70 text-sm mb-4 line-clamp-2">{post?.['Descripcion Corta'] || post?.Descripcion || ''}</p>
                                                        <div className="mt-auto pt-4 border-t border-brand-dark/10 flex items-center justify-between">
                                                            <span className="text-xs font-bold text-brand-dark/60">{post?.Autor || 'Elementa'}</span>
                                                            <span className="text-xs font-black uppercase flex items-center">Leer más <Play className="w-3 h-3 ml-1"/></span>
                                                        </div>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* PANEL ADMIN */}
                        {user && currentView === 'admin' && user?.role === 'admin' && (
                            <div className="animate-slide-up space-y-6">
                                <div className="px-2 mt-4"><h2 className="text-4xl font-black uppercase leading-none mt-1">Panel Admin</h2></div>
                                <div className="flex gap-2 overflow-x-auto hide-scroll px-2 pb-2">
                                    <button onClick={() => setAdminTab('evidencias')} className={`shrink-0 px-5 py-2.5 rounded-full text-xs font-black uppercase tracking-widest transition-all ${adminTab === 'evidencias' ? 'bg-brand-dark text-brand-bg1 shadow-lg' : 'glass-card text-brand-dark hover:bg-white'}`}>Validar Evidencias</button>
                                    <button onClick={() => setAdminTab('validacionPagos')} className={`shrink-0 px-5 py-2.5 rounded-full text-xs font-black uppercase tracking-widest transition-all ${adminTab === 'validacionPagos' ? 'bg-brand-dark text-brand-bg1 shadow-lg' : 'glass-card text-brand-dark hover:bg-white'}`}>Gestión Atletas</button>
                                </div>

                                {/* GESTIÓN DE ATLETAS (INFO PERSONAS) */}
                                {adminTab === 'validacionPagos' && (
                                    <div className="glass-card p-4 sm:p-6 rounded-[2rem] border border-white/40">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-xl font-black flex items-center gap-2"><Users className="w-5 h-5"/> Directorio de Atletas</h3>
                                        </div>
                                        
                                        {dataLoading ? <Loader /> : (
                                            <div className="space-y-3">
                                                {adminSheetData?.map((row, idx) => {
                                                    if (!row) return null;
                                                    const nombreCompleto = `${row.Nombres || ''} ${row.Apellidos || ''}`.trim() || row.Correo || 'Atleta Sin Nombre';
                                                    const caducidad = row.Caducidad || row['Fecha de Caducidad'] || '';
                                                    const estado = String(row.Estado || '').trim().toLowerCase() === 'activo' ? 'Activo' : 'Inactivo';
                                                    const infoDias = calcularDias(caducidad);
                                                    
                                                    return (
                                                        <div key={idx} className="bg-white/60 p-4 rounded-2xl border border-brand-dark/10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-sm hover:bg-white/80 transition-colors">
                                                            <div className="flex-1">
                                                                <div className="flex items-center gap-2">
                                                                    <h4 className="font-black text-brand-dark uppercase text-sm">{nombreCompleto}</h4>
                                                                    <span className="text-[9px] bg-black/5 px-2 py-0.5 rounded font-black text-brand-dark/50">CC: {row.Cedula || 'N/A'}</span>
                                                                </div>
                                                                <div className="flex flex-wrap gap-2 mt-2 items-center">
                                                                    <span className={`text-[10px] font-black uppercase px-2 py-1 rounded ${estado === 'Activo' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{estado}</span>
                                                                    <span className="text-[10px] font-bold text-brand-dark/70 bg-black/5 px-2 py-1 rounded border border-black/5">{row.Plan || 'Sin Plan'}</span>
                                                                    <span className={`text-[10px] font-black uppercase px-2 py-1 bg-white rounded border border-brand-dark/5 ${infoDias.color}`}>{infoDias.texto} ({formatearFecha(caducidad)})</span>
                                                                </div>
                                                            </div>
                                                            <button onClick={() => setEditingPayment(row)} className="shrink-0 w-full sm:w-auto bg-brand-dark text-brand-bg1 px-4 py-2.5 rounded-xl font-black text-[10px] uppercase shadow-md hover:scale-105 flex items-center justify-center gap-2"><Activity className="w-4 h-4"/> Editar Estado</button>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* VALIDACIÓN DE EVIDENCIAS */}
                                {adminTab === 'evidencias' && (
                                    <div className="glass-card p-4 sm:p-6 rounded-[2rem] border border-white/40">
                                        <h3 className="text-xl font-black flex items-center gap-2 mb-6"><CheckCircle className="w-5 h-5"/> Retos y Mejoras Pendientes</h3>
                                        
                                        {adminEvalEvidencia ? (
                                            <div className="animate-fade-in bg-white/60 p-4 sm:p-6 rounded-2xl border border-brand-dark/10">
                                                <button onClick={() => setAdminEvalEvidencia(null)} className="text-[10px] font-black uppercase text-brand-dark/50 hover:text-brand-dark mb-4 flex items-center gap-1"><X className="w-3 h-3"/> Volver a la lista</button>
                                                <h4 className="font-black text-xl mb-1 uppercase tracking-wider">{adminEvalEvidencia.Reto}</h4>
                                                <p className="text-sm font-bold text-brand-dark/70 mb-4">{adminEvalEvidencia.Correo}</p>
                                                
                                                <div className="mb-6 rounded-xl overflow-hidden text-center flex flex-col items-center">
                                                    {adminEvalEvidencia.URL_Evidencia && adminEvalEvidencia.URL_Evidencia.indexOf('Base64') === -1 ? (
                                                        <a href={adminEvalEvidencia.URL_Evidencia} target="_blank" rel="noopener noreferrer" className="bg-blue-100 text-blue-700 px-6 py-3 rounded-full font-black text-xs uppercase hover:bg-blue-200 transition-colors flex items-center gap-2 shadow-sm border border-blue-200">
                                                            <ExternalLink className="w-4 h-4"/> Ver Evidencia
                                                        </a>
                                                    ) : (
                                                        <div className="bg-brand-dark/10 w-full h-32 rounded-xl flex items-center justify-center font-bold text-brand-dark/50 border border-brand-dark/20 border-dashed text-center px-4">
                                                            <Camera className="w-6 h-6 mr-2 opacity-50 shrink-0"/> {adminEvalEvidencia.URL_Evidencia || 'Sin Evidencia Adjunta'}
                                                        </div>
                                                    )}
                                                </div>

                                                <form onSubmit={handleAdminValidateEvidence} className="space-y-4">
                                                    <div>
                                                        <label className="block text-[10px] font-black uppercase mb-1">Observación al Atleta (Obligatorio si se rechaza)</label>
                                                        <select name="observacion" className="w-full p-3.5 rounded-xl bg-white font-bold outline-none border border-brand-dark/10 shadow-sm text-sm">
                                                            <option value="">-- Selecciona una Observación Prediseñada --</option>
                                                            {OPCIONES_OBSERVACION.map((o, i) => <option key={i} value={o}>{o}</option>)}
                                                        </select>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-3 pt-4 border-t border-brand-dark/10">
                                                        <button type="submit" name="decision" value="Rechazado" disabled={loading} className="w-full bg-red-100 text-red-700 p-4 rounded-xl font-black uppercase hover:bg-red-200 transition-colors shadow-sm">{loading ? '...' : 'Rechazar'}</button>
                                                        <button type="submit" name="decision" value="Aprobado" disabled={loading} className="w-full bg-green-500 text-white p-4 rounded-xl font-black uppercase hover:bg-green-600 transition-colors shadow-md">{loading ? '...' : `Aprobar (+${adminEvalEvidencia.Puntos || 0})`}</button>
                                                    </div>
                                                </form>
                                            </div>
                                        ) : (
                                            <div className="space-y-3">
                                                {(!adminEvidencias || adminEvidencias.length === 0) ? (
                                                    <p className="text-center font-bold text-brand-dark/50 py-8 bg-white/40 rounded-2xl border border-white">No hay evidencias pendientes por revisar.</p>
                                                ) : (
                                                    adminEvidencias.map((ev, i) => {
                                                        if (!ev) return null;
                                                        return (
                                                        <div key={i} className="bg-white/60 p-4 rounded-2xl border border-brand-dark/10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-sm">
                                                            <div>
                                                                <div className="flex items-center gap-2 mb-1">
                                                                    <span className={`px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider bg-orange-100 text-orange-700`}>{ev.Estado || 'Pendiente'}</span>
                                                                    <span className="text-[10px] font-black uppercase text-brand-dark/50">{formatearFecha(ev.Fecha)}</span>
                                                                </div>
                                                                <p className="font-black text-brand-dark text-sm leading-tight uppercase">{ev.Reto || 'Evidencia'}</p>
                                                                <p className="text-xs font-bold text-brand-dark/70 mt-1">{ev.Correo}</p>
                                                            </div>
                                                            <button onClick={() => setAdminEvalEvidencia(ev)} className="w-full sm:w-auto shrink-0 bg-brand-dark text-brand-bg1 px-4 py-2.5 rounded-xl font-black text-[10px] uppercase shadow-md hover:scale-105">Evaluar Prueba</button>
                                                        </div>
                                                    )})
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ==============================================
                            NAVEGACIÓN INFERIOR (COMPLETAMENTE ASEGURADA Y GLOBAL)
                            ============================================== */}
                        {user && <BottomNav />}

                        {/* MODALES EXTRAS (SUBIR EVIDENCIA, EDITAR PAGOS, VER BLOG, VER VIDEO) */}
                        {uploadingReto && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-fade-in">
                                <div className="bg-[#f0e3d1] w-full max-w-sm rounded-[2.5rem] p-6 shadow-2xl relative animate-zoom-in border border-white/20">
                                    <button type="button" onClick={() => {setUploadingReto(null); setPreviewFile(null); setErrorMsg(''); setSuccessMsg('');}} className="absolute top-4 right-4 bg-brand-dark/10 text-brand-dark p-2 rounded-full hover:bg-brand-dark/20"><X className="w-4 h-4" /></button>
                                    <h3 className="text-xl font-black uppercase mb-2 text-center text-brand-dark">Enviar Evidencia</h3>
                                    <p className="text-xs font-bold text-brand-dark/60 mb-6 text-center leading-tight uppercase">{uploadingReto.Titulo}</p>
                                    
                                    {successMsg && <div className="bg-yellow-500 text-white p-3 rounded-xl mb-4 text-xs font-bold text-center shadow-md animate-pulse">{successMsg}</div>}
                                    {errorMsg && <div className="bg-red-500 text-white p-3 rounded-xl mb-4 text-xs font-bold text-center shadow-md">{errorMsg}</div>}

                                    <form onSubmit={handleEvidenceSubmit} className="space-y-4">
                                        {previewFile ? (
                                            <div className="w-full flex flex-col items-center gap-3">
                                                <div className="w-full h-48 bg-black/5 rounded-2xl border border-black/10 overflow-hidden flex items-center justify-center relative group">
                                                    {previewFile.type.startsWith('video/') ? (
                                                        <video src={previewFile.url} controls className="w-full h-full object-contain bg-black"></video>
                                                    ) : (
                                                        <img src={previewFile.url} className="w-full h-full object-contain" />
                                                    )}
                                                    <button type="button" onClick={() => setPreviewFile(null)} className="absolute top-2 right-2 bg-black/50 text-white font-black text-[10px] uppercase px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm">Cambiar</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="relative w-full h-32 rounded-2xl bg-white/60 border-2 border-dashed border-brand-dark/30 hover:border-brand-dark hover:bg-white transition-colors flex flex-col items-center justify-center gap-2 font-black cursor-pointer uppercase text-xs tracking-wider">
                                                <Camera className="w-8 h-8 text-brand-dark/50" />
                                                <span className="text-brand-dark/50 text-center px-4">Toca para subir Foto / Video</span>
                                                <input type="file" name="imagen" accept="image/*,video/*" onChange={handleFileChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                            </div>
                                        )}
                                        
                                        <button type="submit" disabled={loading} className="w-full bg-brand-dark text-brand-bg1 p-4 rounded-xl font-black uppercase hover:scale-105 shadow-xl transition-transform disabled:opacity-50">{loading ? 'Procesando...' : 'Enviar a Revisión'}</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {editingPayment && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-fade-in">
                                <div className="bg-[#f0e3d1] w-full max-w-sm rounded-[2.5rem] p-6 shadow-2xl relative animate-zoom-in border border-white/20">
                                    <button type="button" onClick={() => setEditingPayment(null)} className="absolute top-4 right-4 bg-brand-dark/10 text-brand-dark p-2 rounded-full hover:bg-brand-dark/20"><X className="w-4 h-4" /></button>
                                    <h3 className="text-xl font-black uppercase mb-1 text-center text-brand-dark flex items-center justify-center gap-2"><Activity className="w-5 h-5"/> Estado del Atleta</h3>
                                    <p className="font-bold text-brand-dark/60 mb-6 text-center text-xs uppercase">{editingPayment.Nombres ? `${editingPayment.Nombres} ${editingPayment.Apellidos || ''}` : editingPayment.Correo}</p>
                                    
                                    {successMsg && <div className="bg-green-500 text-white p-3 rounded-xl mb-4 text-xs font-bold text-center shadow-md">{successMsg}</div>}
                                    {errorMsg && <div className="bg-red-500 text-white p-3 rounded-xl mb-4 text-xs font-bold text-center shadow-md">{errorMsg}</div>}

                                    <form onSubmit={handlePaymentUpdate} className="space-y-4">
                                        <div>
                                            <label className="block text-[10px] font-black uppercase mb-1 text-brand-dark">Estado</label>
                                            <select name="Estado" defaultValue={editingPayment.Estado} className="w-full p-3 rounded-xl bg-white/60 focus:bg-white outline-none font-black text-sm text-brand-dark border border-brand-dark/5 shadow-inner">
                                                <option value="Activo">Activo</option>
                                                <option value="Inactivo">Inactivo</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black uppercase mb-1 text-brand-dark">Plan Suscrito</label>
                                            <select name="Plan" defaultValue={editingPayment.Plan} className="w-full p-3 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-sm text-brand-dark border border-brand-dark/5 shadow-inner">
                                                <option value="Plan Full - Elementa">Plan Full - Elementa</option>
                                                <option value="Plan 12 Clases - Elementa">Plan 12 Clases - Elementa</option>
                                                <option value="Plan Mañanas - Elementa">Plan Mañanas - Elementa</option>
                                                <option value="Plan Estudiantes - Elementa">Plan Estudiantes - Elementa</option>
                                                <option value="Plan Parejas - Elementa">Plan Parejas - Elementa</option>
                                                <option value="Plan Semestral - Elementa">Plan Semestral - Elementa</option>
                                                <option value="Plan Anualidad - Elementa">Plan Anualidad - Elementa</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black uppercase mb-1 text-brand-dark">Fecha de Vencimiento (Caducidad)</label>
                                            <input type="date" name="Fecha de Caducidad" defaultValue={editingPayment.Caducidad || editingPayment['Fecha de Caducidad'] ? new Date(editingPayment.Caducidad || editingPayment['Fecha de Caducidad']).toISOString().split('T')[0] : ''} className="w-full p-3 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-sm text-brand-dark border border-brand-dark/5 shadow-inner" />
                                        </div>
                                        <div className="mt-6 pt-4 border-t border-brand-dark/10">
                                            <button type="submit" disabled={loading} className="w-full bg-brand-dark text-brand-bg1 p-4 rounded-xl font-black uppercase hover:scale-105 shadow-xl transition-transform text-xs">{loading ? 'Guardando...' : 'Guardar Cambios'}</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {selectedPost && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-0 sm:p-6 modal-overlay animate-fade-in" onClick={() => setSelectedPost(null)}>
                                <div className="bg-brand-bg1 w-full h-full sm:max-h-[90vh] sm:max-w-4xl sm:rounded-[2.5rem] overflow-hidden shadow-2xl relative animate-zoom-in flex flex-col border border-white/10" onClick={e => e.stopPropagation()}>
                                    <button onClick={() => setSelectedPost(null)} className="absolute top-4 right-4 z-30 bg-black/40 backdrop-blur-md text-white p-2 rounded-full shadow-lg hover:bg-black transition-colors"><X className="w-6 h-6" /></button>
                                    
                                    <div className="flex-1 overflow-y-auto hide-scroll bg-brand-bg1">
                                        {selectedPost.URL_Imagen && (
                                            <div className="w-full h-64 sm:h-96 relative shadow-md bg-brand-dark">
                                                <img src={selectedPost.URL_Imagen} className="w-full h-full object-cover" alt="Detalle" />
                                            </div>
                                        )}
                                        <div className={`p-6 sm:p-12 ${!selectedPost.URL_Imagen ? 'pt-20' : ''}`}>
                                            <div className="flex gap-3 mb-5">
                                                <span className="bg-brand-dark text-brand-bg1 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest shadow-sm">{selectedPost.Etiqueta || 'Evento'}</span>
                                                <span className="text-brand-dark/60 text-xs font-bold uppercase py-1.5">{formatearFecha(selectedPost.Fecha)}</span>
                                            </div>
                                            <h2 className="text-3xl sm:text-5xl font-black text-brand-dark leading-tight mb-8 drop-shadow-sm">{selectedPost.Titulo}</h2>
                                            <div className="text-brand-dark/90 font-medium leading-relaxed whitespace-pre-wrap text-base sm:text-lg">
                                                {selectedPost.Contenido || selectedPost.Descripcion}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {selectedVideo && (() => {
                            return (
                                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-fade-in" onClick={() => setSelectedVideo(null)}>
                                    <div className="bg-black w-full max-w-4xl rounded-3xl overflow-hidden shadow-2xl relative aspect-video flex flex-col" onClick={e => e.stopPropagation()}>
                                        <div className="absolute top-4 right-4 z-30 flex gap-2">
                                            <button onClick={completeVideoChallenge} disabled={loading} className="bg-orange-500/90 text-white px-4 py-2 rounded-full font-black text-[10px] uppercase tracking-wider hover:bg-orange-600 backdrop-blur-md shadow-lg">{loading ? '...' : 'Terminé de verlo (+ Pts)'}</button>
                                            <button onClick={() => setSelectedVideo(null)} className="bg-black/50 text-white p-2 rounded-full hover:bg-black transition-colors border border-white/20"><X className="w-5 h-5" /></button>
                                        </div>
                                        <div className="flex-1 w-full h-full relative">
                                            {selectedVideo.type === 'youtube' && <iframe src={`https://www.youtube.com/embed/${selectedVideo.id}?autoplay=1&rel=0&modestbranding=1`} className="absolute inset-0 w-full h-full border-0" allow="autoplay; fullscreen"></iframe>}
                                            {selectedVideo.type === 'drive' && <iframe src={`https://drive.google.com/file/d/${selectedVideo.id}/preview`} className="absolute inset-0 w-full h-full border-0" allow="autoplay; fullscreen"></iframe>}
                                            {!selectedVideo.type && <div className="absolute inset-0 flex items-center justify-center text-white/50 font-bold text-sm">Video no soportado (verificar link en Excel).</div>}
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}

                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
