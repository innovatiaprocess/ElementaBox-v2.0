        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_6zQAaeVwPK_E76DZ4ipxU-vZcU3_Qqi0hv-pbcX-ezVpxNNLaUATL4j-jcmbc94-/exec";

        const apiCall = async (action, payload) => {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, payload })
                });
                return await response.json();
            } catch (error) {
                console.error("Error API:", error);
                return { status: 'error', message: 'Error de conexión. Revisa tu internet o contacta al administrador.' };
            }
        };

        const getVideoData = (url) => {
            if (!url) return { type: null, id: null };
            const safeUrl = String(url);
            const ytRegex = new RegExp("^.*(youtu\\.be\\/|v\\/|u\\/\\w\\/|embed\\/|watch\\?v=|\\&v=)([^#\\&\\?]*).*");
            const ytMatch = safeUrl.match(ytRegex);
            if (ytMatch && ytMatch[2].length === 11) return { type: 'youtube', id: ytMatch[2] };
            const driveRegex = new RegExp("(?:\\/d\\/|id=)([a-zA-Z0-9_-]+)");
            const driveMatch = safeUrl.match(driveRegex);
            if (driveMatch) return { type: 'drive', id: driveMatch[1] };
            return { type: null, id: null };
        };

        const formatearFecha = (fechaString) => {
            if (!fechaString) return 'N/A';
            const date = new Date(fechaString);
            if(isNaN(date.getTime())) return String(fechaString);
            const utcDate = new Date(date.getTime() + date.getTimezoneOffset() * 60000);
            const d = String(utcDate.getDate()).padStart(2, '0');
            const m = String(utcDate.getMonth() + 1).padStart(2, '0');
            const y = utcDate.getFullYear();
            return `${d}/${m}/${y}`;
        };

        const getBase64 = (file) => {
            return new Promise((resolve, reject) => {
                if (!file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                    return;
                }
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let width = img.width; let height = img.height;
                        if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
                reader.onerror = error => reject(error);
            });
        };

        const Loader = () => <div className="flex justify-center py-12"><div className="w-10 h-10 border-4 border-brand-dark border-t-transparent rounded-full animate-spin"></div></div>;

            useEffect(() => {

            const loadAppData = async (currentUser) => {
                setDataLoading(true);
                const res = await apiCall('getData', { 
                    role: currentUser.role, 
                    cedula: currentUser.cedula,
                    email: currentUser.correo

                if (res.status === 'success') {
                    setVideos(res.videos || []);
                    setBlogPosts(res.blog || []);
                    setRetosList(res.retos || []);

                    setWodsList(res.wods || []);

                    if (res.misSkills && typeof res.misSkills === 'object') {
                        loadedSkills = { ...loadedSkills, ...res.misSkills };
                    }
                    setUserSkills(loadedSkills);
                    setMaxSkills(loadedSkills); 

                    if (res.videos && res.videos.length > 0) {
                        setExpandedCategories({ [res.videos[0].Categoria || 'N1']: true });

                    if (currentUser.role === 'admin') {

                        setAdminEvidencias(res.adminEvidencias || []);

                } else {
                    setErrorMsg("Error al cargar datos del servidor.");
                }
                setDataLoading(false);
            };

                e.preventDefault(); setLoading(true); setErrorMsg('');
                const cedula = e.target.cedula.value;

                const res = await apiCall('login', { cedula, password });
                
                if (res.status === 'success') {

                    setCurrentView('home');
                    loadAppData(res.user);
                } else { setErrorMsg(res.message || 'Cédula o Contraseña incorrecta.'); }
                setLoading(false);
            };

                e.preventDefault(); setLoading(true); setErrorMsg('');
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                const res = await apiCall('register', data);
                
                if (res.status === 'success') {

                    setTimeout(() => { setSuccessMsg(''); setCurrentView('login'); }, 2000);

            const handleLogout = () => {

                const gimLevels = ['azul', 'verde', 'morada', 'negra', 'roja', 'sin'];
                let hasImprovements = false;
                
                for (let mov in userSkills) {
                    let nv = userSkills[mov];
