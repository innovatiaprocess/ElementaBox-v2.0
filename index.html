                        const MAX_WIDTH = 1024;
                        let width = img.width; let height = img.height;
                        if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.65));
                    };
                };
                reader.onerror = error => reject(error);
            });
        };

        const GlobalLoader = () => (
            <div className="fixed inset-0 z-[999999] bg-[#E5D3BD]/95 backdrop-blur-xl flex flex-col items-center justify-center animate-fade-in" style={{ pointerEvents: 'all' }}>
                <div className="relative flex items-center justify-center mb-16 w-64 h-64 sm:w-80 sm:h-80">
                    <div className="absolute inset-0">
                        <div className="orb-aura aura-fire"></div>
                        <div className="orb-aura aura-water"></div>
                        <div className="orb-aura aura-earth"></div>
                        <div className="orb-aura aura-air"></div>
                    </div>
                    <div className="w-48 h-48 sm:w-64 sm:h-64 relative z-10 animate-float rounded-full overflow-hidden shadow-[0_0_40px_rgba(0,0,0,0.3)] border-4 border-[#E5D3BD]/50">
                        <img src="https://lh3.googleusercontent.com/d/1CDtlPBzeohniETytbfVOI43VMmk_vQTn" alt="Elementa Logo" className="w-full h-full object-cover scale-[1.05]" />
                    </div>
                </div>
                
                <div className="text-brand-dark font-black uppercase tracking-[0.3em] text-sm animate-pulse flex flex-col items-center gap-3">
                    <span>Sincronizando Elementos</span>
                    <div className="flex gap-2">
                        <div className="w-2.5 h-2.5 rounded-full bg-red-500 animate-bounce shadow-md" style={{animationDelay: '0s'}}></div>
                        <div className="w-2.5 h-2.5 rounded-full bg-blue-500 animate-bounce shadow-md" style={{animationDelay: '0.15s'}}></div>
                        <div className="w-2.5 h-2.5 rounded-full bg-green-500 animate-bounce shadow-md" style={{animationDelay: '0.3s'}}></div>
                        <div className="w-2.5 h-2.5 rounded-full bg-slate-300 animate-bounce shadow-md" style={{animationDelay: '0.45s'}}></div>
                    </div>
                </div>
            </div>
        );

        function App() {
            const [user, setUser] = useState(null); 
            const [currentView, setCurrentView] = useState('login'); 
            const [loading, setLoading] = useState(false);
            const [dataLoading, setDataLoading] = useState(true); 
            const [errorMsg, setErrorMsg] = useState('');
            const [successMsg, setSuccessMsg] = useState('');

            const [videos, setVideos] = useState([]);
            const [blogPosts, setBlogPosts] = useState([]);
            const [misPuntos, setMisPuntos] = useState(0);
            const [retosList, setRetosList] = useState([]);
            const [rankingList, setRankingList] = useState([]);
            const [wodsList, setWodsList] = useState([]); 
            
            const [searchTerm, setSearchTerm] = useState('');
            const [expandedCategories, setExpandedCategories] = useState({});
            const [selectedPost, setSelectedPost] = useState(null); 
            const [selectedVideo, setSelectedVideo] = useState(null); 
            const [uploadingReto, setUploadingReto] = useState(null);
            const [previewFiles, setPreviewFiles] = useState([]);
            const [showProfileModal, setShowProfileModal] = useState(false);

            const [skillTab, setSkillTab] = useState('gimnasia'); 
            const [userSkills, setUserSkills] = useState(defaultSkills); 
            const [maxSkills, setMaxSkills] = useState(defaultSkills);
            const [pendingSkills, setPendingSkills] = useState({});
            const [history, setHistory] = useState([]);
            const [selectedHistoryItem, setSelectedHistoryItem] = useState(null);

            const [adminTab, setAdminTab] = useState('evidencias'); 
            const [adminSheetData, setAdminSheetData] = useState([]);
            const [editingPayment, setEditingPayment] = useState(null);
            const [adminEvidencias, setAdminEvidencias] = useState([]);
            const [adminEvalEvidencia, setAdminEvalEvidencia] = useState(null);
            
            const [editingEvent, setEditingEvent] = useState(null);
            const [editingWOD, setEditingWOD] = useState(null);

            // ==========================================
            // CONTROL DE SESIÓN FIREBASE
            // ==========================================
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (firebaseUser) => {
                    if (firebaseUser) {
                        await fetchUserProfile(firebaseUser);
                    } else {
                        setUser(null);
                        setCurrentView('login');
                        setDataLoading(false);
                        setLoading(false); // Resetea el botón en caso de error o salida
                    }
                });
                return () => unsubscribe();
            }, []);

            // AUTO-ABRIR MODAL DE PERFIL SI FALTAN DATOS VITALES
            useEffect(() => {
                if (user && currentView === 'home') {
                    if (!user.cedula || !user.telefono) {
                        setShowProfileModal(true);
                    }
                }
            }, [user, currentView]);

            const fetchUserProfile = async (firebaseUser) => {
                setDataLoading(true);
                const res = await apiCall('syncUserProfile', { 
                    email: firebaseUser.email,
                    displayName: firebaseUser.displayName || ''
                });
                if (res.status === 'success') {
                    setUser(res.user);
                    setCurrentView('home');
                    await loadAppData(res.user);
                } else {
                    setErrorMsg(res.message || "No pudimos conectar con la base de datos.");
                    await auth.signOut();
                }
                setDataLoading(false);
                setLoading(false); // Liberar botón
            };

            const loadAppData = async (currentUser) => {
                setDataLoading(true);
                const res = await apiCall('getData', { 
                    role: currentUser.role, 
                    email: currentUser.correo
                });
                
                if (res.status === 'success') {
                    setVideos(res.videos || []);
                    setBlogPosts(res.blog || []);
                    setRetosList(res.retos || []);
                    setMisPuntos(res.misPuntos || 0);
                    setRankingList(res.ranking || []);
                    setWodsList(res.wods || []); 

                    let loadedSkills = { ...defaultSkills };
                    if (res.misSkills && typeof res.misSkills === 'object') {
                        loadedSkills = { ...loadedSkills, ...res.misSkills };
                    }
                    setMaxSkills(loadedSkills); 
                    
                    const pendientes = res.misSkillsPendientes || {};
                    setPendingSkills(pendientes);
                    setHistory(res.misEvidencias || []);

                    let uiSkills = { ...loadedSkills };
                    for(let mov in pendientes) {
                        if (gimLevels.includes(pendientes[mov])) {
                            if (gimLevels.indexOf(pendientes[mov]) > gimLevels.indexOf(uiSkills[mov] || 'azul')) {
                                uiSkills[mov] = pendientes[mov];
                            }
                        } else if (!isNaN(pendientes[mov])) {
                            if (Number(pendientes[mov]) > Number(uiSkills[mov] || 0)) {
                                uiSkills[mov] = pendientes[mov];
                            }
                        }
                    }
                    setUserSkills(uiSkills);

                    if (res.videos && res.videos.length > 0) {
                        const firstCat = getProp(res.videos[0], 'Categoria') || 'N1';
                        setExpandedCategories({ [firstCat]: true });
                    }

                    if (currentUser.role === 'admin') {
                        setAdminSheetData(res.adminSheet || []);
                        setAdminEvidencias(res.adminEvidencias || []);
                    }
                } else {
                    setErrorMsg("Error al cargar datos del servidor.");
                }
                setDataLoading(false);
            };

            // ==========================================
            // FUNCIONES DE LOGIN / AUTH MODERNAS
            // ==========================================
            const handleGoogleAuth = async () => {
                setLoading(true); setErrorMsg('');
                try {
                    await auth.signInWithPopup(googleProvider);
                } catch(err) {
                    if (err.code !== 'auth/popup-closed-by-user') {
                        setErrorMsg("Error al conectar con Google: " + err.message);
                    }
                    setLoading(false); // Resetea el botón si falla
                }
            };

            const handleLogout = async () => { 
                await auth.signOut();
                setUser(null); 
                setCurrentView('login'); 
            };

            // ==========================================
            // ACTUALIZAR PERFIL DESDE LA APP
            // ==========================================
            const handleUpdateProfile = async (e) => {
                e.preventDefault(); setLoading(true); setErrorMsg(''); setSuccessMsg('');
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                data.correo = user.correo; 
                
                const res = await apiCall('updateProfile', data);
                if (res.status === 'success') {
                    setSuccessMsg("¡Perfil actualizado con éxito!");
                    setTimeout(() => { 
                        setSuccessMsg(''); 
                        setShowProfileModal(false); 
                    }, 2000);
                    // Actualizar el estado local
                    setUser(prev => ({...prev, ...data, name: data.nombres}));
                } else {
                    setErrorMsg(res.message || "Error al actualizar perfil.");
                }
                setLoading(false);
            };

            const handleNavigation = (view) => { setCurrentView(view); window.scrollTo(0, 0); };

            const handleActualizarSkillsClick = () => {
                let hasImprovements = false;
                
                for (let mov in userSkills) {
                    let nv = userSkills[mov];
                    let ov = maxSkills[mov];
                    if (gimLevels.includes(nv)) {
                        let nIdx = gimLevels.indexOf(nv);
                        let oIdx = ov ? gimLevels.indexOf(ov) : 0;
                        if (nIdx > oIdx) hasImprovements = true;
                    } else if (!isNaN(nv)) {
                        let nVal = Number(nv);
                        let oVal = Number(ov) || 0;
                        if (nVal - oVal >= 5) hasImprovements = true;
                    }
                }

                if (hasImprovements) {
                    setUploadingReto({ Titulo: 'Validación de Nuevas Marcas (PR/Niveles)', Puntos: 'Por Calcular', isSkillUpdate: true });
                } else {
                    handleSaveSkillsSilently();
                }
            };

            const handleSaveSkillsSilently = async () => {
                setLoading(true); setErrorMsg(''); setSuccessMsg('');
                const res = await apiCall('updateSkillsWithEvidence', {
                    correo: user.correo || user.email, skills: userSkills, archivos: []
                });
                if (res.status === 'success') {
                    setSuccessMsg('Progreso guardado (Las marcas inferiores no otorgan puntos ni requieren evidencia).');
                    loadAppData(user); 
                } else { setErrorMsg('Error al guardar el progreso.'); }
                setLoading(false);
                setTimeout(() => { setSuccessMsg(''); setErrorMsg(''); }, 4000);
            };

            const handleFileChange = (e) => {
                const files = Array.from(e.target.files);
                if(files.length > 0) { 
                    const newFiles = files.map((file) => ({
                        url: URL.createObjectURL(file),
                        type: file.type,
                        originalFile: file
                    }));
                    setPreviewFiles((prev) => [...prev, ...newFiles]); 
                    setErrorMsg(''); 
                } 
            };

            const handleEvidenceSubmit = async (e) => {
                e.preventDefault(); setLoading(true); setSuccessMsg('Procesando evidencia (puede tardar un momento)...'); setErrorMsg('');
                try {
                    let archivos = [];
                    if (previewFiles && previewFiles.length > 0) {
                        for(let pf of previewFiles) {
                            if(pf.originalFile.size > 8 * 1024 * 1024) { setErrorMsg("Un archivo es muy pesado (Máximo 8MB)."); setLoading(false); setSuccessMsg(''); return; }
                            const b64 = await getBase64(pf.originalFile);
                            archivos.push({ base64: b64, filename: pf.originalFile.name || 'evidencia.jpg' });
                        }
                    }
                    
                    let res;
                    if (uploadingReto.isSkillUpdate) {
                        res = await apiCall('updateSkillsWithEvidence', {
                            correo: user.correo || user.email, skills: userSkills, archivos: archivos
                        });
                    } else {
                        res = await apiCall('submitEvidence', {
                            correo: user.correo || user.email, reto: uploadingReto.Titulo, puntos: uploadingReto.Puntos, archivos: archivos
                        });
                    }

                    if (res.status === 'success') {
                        setSuccessMsg(res.message || 'Evidencia enviada a revisión.');
                        setTimeout(() => { setUploadingReto(null); setPreviewFiles([]); setSuccessMsg(''); loadAppData(user); }, 3000);
                    } else { setErrorMsg(res.message || 'Error al subir la evidencia.'); setSuccessMsg(''); }
                } catch(e) { setErrorMsg("Error al procesar el archivo."); setSuccessMsg(''); }
                setLoading(false);
            };

            const completeVideoChallenge = async () => {
                setLoading(true);
                const res = await apiCall('submitEvidence', { correo: user.correo || user.email, reto: `Ver video: ${selectedVideo.Nombre || 'Academia'}`, puntos: 1, archivos: [] });
                if (res.status === 'success') {
                    setSuccessMsg('Puntos asignados exitosamente.');
                    await loadAppData(user); 
                    setLoading(false);
                    setTimeout(() => { setSelectedVideo(null); setSuccessMsg(''); }, 1500);
                } else { 
                    setErrorMsg(res.message); 
                    setLoading(false);
                }
            };

            const handleSkillUpdate = (movimiento, valor) => { setUserSkills((prev) => ({...prev, [movimiento]: valor})); };

            const handleAdminValidateEvidence = async (e, estadoDecision) => {
                e.preventDefault(); 
                setLoading(true);
                
                const form = e.target.closest('form');
                const observacion = form.observacion.value;
                
                if (estadoDecision === 'Rechazado' && !observacion) { 
                    setErrorMsg("Debe seleccionar una observación para rechazar."); 
                    setTimeout(() => setErrorMsg(''), 4000); 
                    setLoading(false); 
                    return; 
                }
                
                const res = await apiCall('evaluateEvidence', { 
                    rowIndex: adminEvalEvidencia._rowIndex, 
                    estado: estadoDecision, 
                    observacion: observacion, 
                    puntos: estadoDecision === 'Aprobado' ? getProp(adminEvalEvidencia, 'Puntos') : 0, 
                    correo: getProp(adminEvalEvidencia, 'Correo') || getProp(adminEvalEvidencia, 'Atleta') 
                });
                
                if (res.status === 'success') { 
                    setAdminEvidencias((prev) => prev.filter((ev) => ev._rowIndex !== adminEvalEvidencia._rowIndex));
                    setAdminEvalEvidencia(null); 
                    setSuccessMsg(`Evidencia ${estadoDecision.toLowerCase()} correctamente. Puntos actualizados.`);
                    setTimeout(() => setSuccessMsg(''), 4000);
                    loadAppData(user); 
                } else { 
                    setErrorMsg(res.message); 
                    setTimeout(() => setErrorMsg(''), 4000);
                }
                setLoading(false);
            };

            const handlePaymentUpdate = async (e) => {
                e.preventDefault(); setLoading(true);
                const formData = new FormData(e.target);
                const res = await apiCall('updatePayment', { rowIndex: editingPayment._rowIndex, data: Object.fromEntries(formData.entries()) });
                if (res.status === 'success') { setSuccessMsg('Actualizado correctamente.'); setTimeout(() => { setSuccessMsg(''); setEditingPayment(null); loadAppData(user); }, 1500); } else { setErrorMsg(res.message); }
                setLoading(false);
            };

            const handleAddEvent = async (e) => {
                e.preventDefault(); setLoading(true); setErrorMsg(''); setSuccessMsg('');
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                const res = await apiCall('addEvento', data);
                if (res.status === 'success') {
                    setSuccessMsg('Evento publicado correctamente.');
                    e.target.reset();
                    loadAppData(user);
                } else { setErrorMsg(res.message); }
                setLoading(false);
                setTimeout(() => setSuccessMsg(''), 3000);
            };

            const handleAddWOD = async (e) => {
                e.preventDefault(); setLoading(true); setErrorMsg(''); setSuccessMsg('');
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                const res = await apiCall('addWOD', data);
                if (res.status === 'success') {
                    setSuccessMsg('WOD registrado correctamente.');
                    e.target.reset();
                    loadAppData(user);
                } else { setErrorMsg(res.message); }
                setLoading(false);
                setTimeout(() => setSuccessMsg(''), 3000);
            };       

            const handleUpdateEvent = async (e) => {
                e.preventDefault(); setLoading(true); setErrorMsg(''); setSuccessMsg('');
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                const res = await apiCall('updateEvento', { rowIndex: editingEvent._rowIndex, data });
                if (res.status === 'success') {
                    setSuccessMsg('Evento actualizado correctamente.');
                    setTimeout(() => { setEditingEvent(null); loadAppData(user); setSuccessMsg(''); }, 1500);
                } else { setErrorMsg(res.message); }
                setLoading(false);
            };

            const handleUpdateWOD = async (e) => {
                e.preventDefault(); setLoading(true); setErrorMsg(''); setSuccessMsg('');
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                const res = await apiCall('updateWOD', { rowIndex: editingWOD._rowIndex, data });
                if (res.status === 'success') {
                    setSuccessMsg('WOD actualizado correctamente.');
                    setTimeout(() => { setEditingWOD(null); loadAppData(user); setSuccessMsg(''); }, 1500);
                } else { setErrorMsg(res.message); }
                setLoading(false);
            };

            const calcularDias = (fechaCaducidad) => {
                if (!fechaCaducidad) return { texto: 'Sin fecha', color: 'text-brand-dark/50' };
                const expDate = new Date(fechaCaducidad);
                if(isNaN(expDate.getTime())) return { texto: 'Inválida', color: 'text-brand-dark/50' };
                const utcDate = new Date(expDate.getTime() + expDate.getTimezoneOffset() * 60000);
                const today = new Date().setHours(0,0,0,0); utcDate.setHours(0,0,0,0);
                const diffDays = Math.ceil((utcDate - today) / (1000 * 60 * 60 * 24));
                if (diffDays < 0) return { texto: `Vencido hace ${Math.abs(diffDays)} días`, color: 'text-red-600' };
                if (diffDays === 0) return { texto: 'Vence HOY', color: 'text-orange-600' };
                if (diffDays <= 5) return { texto: `Vence en ${diffDays} días`, color: 'text-orange-500' };
                return { texto: `${diffDays} días restantes`, color: 'text-green-600' };
            };

            const groupedFilteredVideos = useMemo(() => {
                const lowerSearch = String(searchTerm || '').toLowerCase();
                const filtered = videos?.filter((v) => String(getProp(v, 'Nombre') || '').toLowerCase().includes(lowerSearch) || String(getProp(v, 'Descripcion') || '').toLowerCase().includes(lowerSearch)) || [];
                return filtered.reduce((acc, v) => {
                    const cat = getProp(v, 'Categoria') || 'General';
                    if (!acc[cat]) acc[cat] = []; acc[cat].push(v); return acc;
                }, {});
            }, [videos, searchTerm]);

            const toggleCategory = (cat) => setExpandedCategories((prev) => ({ ...prev, [cat]: !prev[cat] }));

            const renderEvidenceLinks = (urlStr) => {
                if (!urlStr) return <div className="text-brand-dark/50 font-bold text-xs">Sin Evidencia Adjunta</div>;
                if (urlStr === 'Generado Automático') return <div className="text-brand-dark/50 font-bold text-xs bg-black/5 px-4 py-2 rounded-xl">Validación automática del Sistema</div>;

                const links = urlStr.split(/[\n,\|]+/).filter((l) => l.trim() !== '');
                if (links.length === 0) return <div className="text-brand-dark/50 font-bold text-xs">Evidencia Inválida</div>;

                return links.map((lnk, idx) => {
                    if (lnk.includes('Error')) {
                        return <div key={idx} className="text-red-500 font-bold text-[10px] p-2 bg-red-100 rounded border border-red-200 mt-1">Archivo {idx + 1}: {lnk}</div>;
                    }
                    return (
                        <a key={idx} href={lnk.trim()} target="_blank" rel="noopener noreferrer" className="bg-blue-100 text-blue-700 px-4 py-2 rounded-full font-black text-[10px] uppercase hover:bg-blue-200 transition-colors flex items-center justify-center gap-1.5 shadow-sm border border-blue-200 shrink-0 mt-1">
                            <ExternalLink className="w-3 h-3"/> Ver Archivo {idx + 1}
                        </a>
                    );
                });
            };

            const Topbar = () => (
                <div className="sticky top-0 z-[100] bg-brand-bg1/95 backdrop-blur-xl px-6 py-4 flex justify-between items-center shadow-sm border-b border-brand-dark/10">
                    <div className="flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full shadow-md overflow-hidden border border-brand-dark/10 shrink-0 bg-brand-dark flex items-center justify-center">
                            <ElementaLogo className="w-full h-full object-cover scale-[1.10]" />
                        </div>
                        <span className="font-black text-xl tracking-widest uppercase text-brand-dark">Elementa</span>
                    </div>
                    {user && (
                        <button onClick={handleLogout} className="flex items-center gap-2 px-3 py-1.5 rounded-full hover:bg-black/5 transition-colors text-brand-dark/80 font-bold text-xs uppercase tracking-wider">
                            Salir <LogOut className="w-4 h-4" />
                        </button>
                    )}
                </div>
            );

            const ProfileSuperCard = () => (
                <div className="sticky top-[76px] z-[90] glass-card rounded-[2rem] p-3.5 flex flex-col gap-3.5 border border-white/60 shadow-lg mb-4 transition-all">
                    <div className="flex justify-between items-center">
                        <div className="flex items-center gap-2.5">
                            <div className="w-10 h-10 bg-brand-dark text-brand-bg1 rounded-full flex items-center justify-center font-black text-xl shadow-md ring-2 ring-brand-bg1/50 uppercase">
                                {String(user.name || user.correo || 'E').charAt(0)}
                            </div>
                            <div className="flex flex-col justify-center">
                                <div className="flex items-center gap-2 mb-1">
                                    <h2 className="text-sm font-black uppercase leading-none text-brand-dark tracking-tight">
                                        {user.name ? `${user.name} ${user.apellidos || ''}` : 'Atleta Elementa'}
                                    </h2>
                                    <button onClick={() => setShowProfileModal(true)} className="text-brand-dark/60 hover:text-brand-dark bg-white/60 hover:bg-white p-1 rounded-full transition-colors shadow-sm border border-brand-dark/10 relative" title="Editar Perfil">
                                        <Settings className="w-3.5 h-3.5" />
                                        {(!user.cedula || !user.eps) && <span className="absolute -top-0.5 -right-0.5 w-2 h-2 bg-red-500 rounded-full border border-[#f4e6d4]"></span>}
                                    </button>
                                </div>
                                <div className="flex items-center gap-1 flex-wrap">
                                    <span className="text-[8px] bg-black/5 px-1.5 py-0.5 rounded font-black uppercase text-brand-dark/60 border border-brand-dark/10">{user.plan || 'Sin Plan'}</span>
                                    <span className={`text-[8px] px-1.5 py-0.5 rounded font-black uppercase shadow-sm ${String(user.status || '').trim().toLowerCase() === 'activo' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-red-100 text-red-700 border border-red-200'}`}>{user.status}</span>
                                </div>
                            </div>
                        </div>
                        
                        <button onClick={() => handleNavigation('ranking')} className="btn-puntos px-4 py-1.5 rounded-[1rem] flex flex-col items-center shadow-md cursor-pointer shrink-0">
                            <span className="font-black text-xl leading-none">{misPuntos}</span>
                            <span className="text-[7px] font-black uppercase tracking-widest mt-0.5 opacity-90 flex items-center gap-0.5"><Trophy className="w-2.5 h-2.5"/> Puntos</span>
                        </button>
                    </div>

                    {!String(user.plan || '').includes('12 Clases') ? (
                        <div className="flex gap-2 w-full">
                            <div className="flex-1 bg-green-500/10 border border-green-500/20 rounded-xl p-1.5 px-3 flex items-center justify-between gap-1 shadow-sm">
                                <div className="flex items-center gap-1">
                                    <Clock className="w-3 h-3 text-green-700 opacity-70"/>
                                    <span className="text-[8px] font-black uppercase text-green-700/60 leading-none">Ingreso</span>
                                </div>
                                <span className="text-[10px] font-black text-green-800 leading-none tracking-wide">{formatearFecha(user.ingreso)}</span>
                            </div>
                            <div className="flex-1 bg-red-500/10 border border-red-500/20 rounded-xl p-1.5 px-3 flex items-center justify-between gap-1 shadow-sm">
                                <div className="flex items-center gap-1">
                                    <AlertCircle className="w-3 h-3 text-red-700 opacity-70"/>
                                    <span className="text-[8px] font-black uppercase text-red-700/60 leading-none">Vence</span>
                                </div>
                                <span className="text-[10px] font-black text-red-800 leading-none tracking-wide">{formatearFecha(user.caducidad)}</span>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-brand-dark/5 rounded-xl p-1.5 flex justify-center items-center text-[10px] font-black text-brand-dark border border-brand-dark/10 shadow-sm">

                        </div>

                <div className="fixed bottom-0 left-0 w-full bg-brand-dark backdrop-blur-lg shadow-[0_-10px_40px_rgba(0,0,0,0.2)] z-[99999] border-t-2 border-brand-bg2 pb-[env(safe-area-inset-bottom)]">
                    <div className="flex justify-between items-center max-w-md mx-auto p-3 px-6">
                        {['home', 'wod', 'academy', 'blog'].map((view) => {
                            const isApp = currentView === view;
                            const icons = { home: Home, wod: Calendar, academy: Video, blog: BookOpen };
                            const labels = { home: 'Home', wod: 'WOD', academy: 'Videos', blog: 'Eventos' };
                            const Icon = icons[view];
                            return (
                                <button key={view} disabled={dataLoading} onClick={() => { if(!dataLoading) handleNavigation(view); }} className={`relative flex flex-col items-center justify-center gap-1.5 transition-all duration-300 ${isApp ? 'text-brand-bg1 scale-110' : 'text-white/50 hover:text-white/80'} ${dataLoading ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                    <Icon className="w-6 h-6" />
                                    <span className="text-[9px] font-black uppercase tracking-widest">{labels[view]}</span>
                                </button>
                            );
                        })}
                        {user?.role === 'admin' && (
                            <button onClick={() => { if(!dataLoading) handleNavigation('admin'); }} disabled={dataLoading} className={`relative flex flex-col items-center justify-center gap-1.5 transition-all duration-300 ${currentView === 'admin' ? 'text-brand-bg1 scale-110' : 'text-white/50 hover:text-white/80'} ${dataLoading ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                <Database className="w-6 h-6" />
                                <span className="text-[9px] font-black uppercase tracking-widest">Admin</span>
                            </button>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="pb-32 min-h-screen">
                    <style dangerouslySetInnerHTML={{ __html: customStyles }} />

                    {dataLoading && <GlobalLoader />}

                    {(user || currentView !== 'login') && <Topbar />}

                    <div className="max-w-4xl mx-auto px-4 pt-6">
                        
                        {user && currentView !== 'login' && currentView !== 'register' && currentView !== 'ranking' && <ProfileSuperCard />}

                        {/* LOGIN MODERNO Y SIMPLE - SOLO GOOGLE */}
                        {!user && currentView === 'login' && (
                            <div className="flex flex-col items-center justify-center animate-slide-up py-10">
                                <div className="mb-10 flex flex-col items-center w-full">
                                    <div className="w-40 h-40 sm:w-48 sm:h-48 mb-6 relative flex items-center justify-center animate-float">
                                        <div className="absolute inset-0 bg-brand-dark/30 blur-2xl rounded-full z-0 translate-y-6 scale-90"></div>
                                        <div className="relative z-10 w-full h-full rounded-full overflow-hidden shadow-2xl border-[6px] border-[#E5D3BD]">
                                            <ElementaLogo className="w-full h-full object-cover scale-[1.05]" />
                                        </div>
                                    </div>
                                    <h1 className="text-5xl font-black uppercase tracking-[0.2em] text-brand-dark drop-shadow-md text-center">Elementa</h1>
                                    <h2 className="text-lg font-bold tracking-[0.5em] text-brand-dark/60 mt-2 text-center">TRAINING BOX</h2>
                                </div>
                                
                                <div className="glass-card p-6 sm:p-8 rounded-[2.5rem] w-full max-w-md border border-white/50 text-center">
                                    <h3 className="text-2xl font-black mb-2 text-center">Bienvenido Atleta</h3>
                                    <p className="text-xs font-bold text-center text-brand-dark/50 mb-8 px-4">
                                        Ingresa con tu cuenta de Google para acceder a tu perfil o registrarte automáticamente.
                                    </p>
                                    
                                    {errorMsg && <div className="bg-red-500/10 text-red-700 p-3 rounded-xl mb-6 text-sm font-bold text-center border border-red-500/20">{errorMsg}</div>}
                                    {successMsg && <div className="bg-green-500/10 text-green-700 p-3 rounded-xl mb-6 text-sm font-bold text-center border border-green-500/20">{successMsg}</div>}

                                    <button type="button" onClick={handleGoogleAuth} disabled={loading} className="w-full bg-white border border-brand-dark/10 text-brand-dark p-4 rounded-xl font-black flex items-center justify-center gap-3 hover:bg-gray-50 shadow-md hover:shadow-lg transition-all text-sm mb-2 hover:scale-[1.02]">
                                        <GoogleIcon /> Continuar con Google
                                    </button>
                                    
                                    <p className="text-[9px] font-bold text-brand-dark/40 mt-6 uppercase tracking-wider">Acceso seguro garantizado por Google</p>
                                </div>
                            </div>
                        )}

                        {/* HOME: SKILLS / HABILIDADES */}

                            <div className="animate-slide-up space-y-4">

                                    <button onClick={() => setSkillTab('gimnasia')} className={`flex-1 py-3 rounded-xl font-black uppercase text-sm transition-all shadow-sm ${skillTab === 'gimnasia' ? 'bg-brand-dark text-brand-bg1' : 'bg-white/50 text-brand-dark hover:bg-white border border-brand-dark/5'}`}>Gimnasia</button>
                                    <button onClick={() => setSkillTab('levantamientos')} className={`flex-1 py-3 rounded-xl font-black uppercase text-sm transition-all shadow-sm ${skillTab === 'levantamientos' ? 'bg-brand-dark text-brand-bg1' : 'bg-white/50 text-brand-dark hover:bg-white border border-brand-dark/5'}`}>Levantamientos</button>
                                </div>

                                <div className="glass-card rounded-[1.5rem] p-4 sm:p-6 border border-white/40 shadow-sm mt-2 mb-6">
                                    {skillTab === 'gimnasia' && (
                                        <div className="space-y-4 animate-fade-in">
                                            <div className="flex items-center gap-2 mb-2">
                                                <Target className="w-6 h-6 text-brand-dark"/>
                                                <h3 className="font-black text-xl uppercase tracking-wider text-brand-dark">Gimnasia</h3>
                                            </div>
                                            <p className="text-[10px] font-bold text-brand-dark/60 bg-white/50 p-3 rounded-xl leading-tight">Tu récord oficial es la base. Si solicitas validar una banda de mayor dificultad, requerirá evidencia en foto o video.</p>
                                            
                                            <div className="flex items-center gap-4 text-[9px] font-black uppercase text-brand-dark/60 mt-3 justify-center bg-white/50 p-2 rounded-xl mb-4 shadow-sm">
                                                <span className="flex items-center gap-1"><div className="w-3 h-3 rounded-full border-2 border-dashed border-gray-400"></div> Nivel Solicitado</span>
                                                <span className="flex items-center gap-1"><div className="w-3 h-3 rounded-full bg-blue-500"></div> PR Oficial</span>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4">

                                                    const isOfficialMax = maxSkills[mov];
                                                    return (
                                                        <div key={idx} className="bg-white/60 p-3.5 sm:p-4 rounded-2xl border border-brand-dark/10 shadow-sm flex flex-col gap-3">

                                                                <h4 className="font-black text-xs text-brand-dark uppercase tracking-wider">{mov}</h4>
                                                                <div className="flex flex-col items-end gap-1 max-w-[60%] text-right">
                                                                    {maxSkills[mov] && maxSkills[mov] !== 'azul' && (
                                                                        <span className="text-[8px] font-black uppercase tracking-widest text-brand-dark/40 bg-black/5 px-2 py-0.5 rounded">PR Oficial: {nivelesGimnasiaList.find(n => n.color === maxSkills[mov])?.label || 'Banda Azul'}</span>
                                                                    )}
                                                                    {pendingSkills[mov] && gimLevels.indexOf(pendingSkills[mov]) > gimLevels.indexOf(maxSkills[mov] || 'azul') && (
                                                                        <span className="text-[8px] font-black uppercase tracking-widest text-orange-700 bg-orange-100 px-2 py-0.5 rounded border border-orange-200 flex items-center gap-1 shadow-sm leading-tight">
                                                                            <Clock className="w-2.5 h-2.5 shrink-0"/> En validación: {nivelesGimnasiaList.find(n => n.color === pendingSkills[mov])?.label}

                                                                    )}
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center justify-between bg-black/5 p-2 rounded-full border border-black/5 mt-1 relative">
                                                                {nivelesGimnasiaList.map((nv) => {
                                                                    const isActive = userSkills[mov] === nv.color;
                                                                    const isMaxOfficial = maxSkills[mov] === nv.color;
                                                                    
                                                                    let btnClass = "w-7 h-7 sm:w-8 sm:h-8 rounded-full transition-all duration-300 relative group flex items-center justify-center ";
                                                                    
                                                                    if (isMaxOfficial) {
                                                                        btnClass += `bg-band-${nv.color} shadow-lg scale-110 z-10 border-2 border-transparent`;
                                                                    } else if (isActive) {
                                                                        btnClass += `bg-transparent border-band-${nv.color} border-[3px] border-dashed scale-110 videogame-active z-10`;
                                                                    } else {
                                                                        btnClass += `bg-black/10 border-2 border-transparent opacity-40 hover:opacity-100 grayscale hover:grayscale-0 hover:scale-110`;
                                                                    }

                                                                    return (
                                                                        <button 
                                                                            key={nv.color}
                                                                            onClick={() => handleSkillUpdate(mov, nv.color)}
                                                                            className={btnClass}
                                                                            title={`${nv.nivel}: ${nv.label}`}
                                                                        >
                                                                            {isActive && <CheckCircle className={`w-4 h-4 drop-shadow-md z-20 absolute ${isMaxOfficial ? 'text-white' : `text-${nv.color}-600`}`}/>}
                                                                        </button>
                                                                    );
                                                                })}
                                                            </div>
                                                            <div className="text-[9px] font-black text-center uppercase tracking-widest text-brand-dark/50">
                                                                Nivel a Solicitar: {userSkills[mov] ? nivelesGimnasiaList.find(n => n.color === userSkills[mov])?.label : 'Sin Nivel'}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                    
                                    {skillTab === 'levantamientos' && (
                                        <div className="space-y-4 animate-fade-in">
                                            <div className="flex items-center gap-2 mb-2">
                                                <Dumbbell className="w-6 h-6 text-brand-dark"/>
                                                <h3 className="font-black text-xl uppercase tracking-wider text-brand-dark">Levantamientos</h3>
                                            </div>
                                            <p className="text-[10px] font-bold text-brand-dark/60 bg-white/50 p-3 rounded-xl leading-tight">Si rompes tu PR oficial (+5lb o más), solicita validación para tus puntos subiendo tu video aquí.</p>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4">
                                                {movimientosLevantamiento.map((mov, idx) => {
                                                    return (
                                                        <div key={idx} className="bg-white/60 p-4 rounded-2xl border border-brand-dark/10 flex items-center justify-between gap-3 shadow-sm hover:bg-white/80 transition-colors flex-wrap">

                                                                <h4 className="font-black text-xs text-brand-dark uppercase tracking-wider leading-tight">{mov}</h4>
                                                                <span className="text-[9px] font-black text-brand-dark/40 uppercase mt-0.5 mb-1 flex items-center gap-1">

                                                                {pendingSkills[mov] > (maxSkills[mov] || 0) && (
                                                                    <span className="text-[8px] font-black uppercase tracking-widest text-orange-700 bg-orange-100 px-2 py-0.5 rounded border border-orange-200 flex items-center gap-1 shadow-sm mt-1">
                                                                        <Clock className="w-2.5 h-2.5"/> En validación: {pendingSkills[mov]} LBS
                                                                    </span>
                                                                )}
                                                            </div>
                                                            <div className="flex items-center gap-1 w-24 sm:w-28 bg-white p-1 rounded-xl border border-brand-dark/20 focus-within:border-brand-dark/60 transition-colors shadow-inner shrink-0">
                                                                <input 
                                                                    type="number" 
                                                                    placeholder="0" 
                                                                    value={userSkills[mov] !== undefined ? userSkills[mov] : ''}
                                                                    onChange={(e) => handleSkillUpdate(mov, e.target.value)}
                                                                    className="w-full p-2 bg-transparent outline-none font-black text-center text-brand-dark text-lg sm:text-xl" 
                                                                />
                                                                <span className="text-[8px] font-black uppercase text-brand-dark/50 pr-2">LBS</span>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                    
                                    <button onClick={handleActualizarSkillsClick} disabled={loading} className="w-full mt-6 bg-brand-dark text-brand-bg1 p-4 rounded-xl font-black uppercase text-sm shadow-xl hover:scale-[1.02] transition-transform flex items-center justify-center gap-2">
                                        {loading ? 'Validando Progreso...' : <><Upload className="w-5 h-5"/> Actualizar Mi Progreso</>}
                                    </button>
                                </div>

                                {/* HISTORIAL DE BATALLAS COMPACTO (TIPO HUD) */}
                                <div className="mt-8 pt-6 border-t-2 border-brand-dark/10 animate-fade-in">
                                    <div className="flex items-center gap-2 mb-4 px-2">
                                        <Activity className="w-5 h-5 text-brand-dark"/>
                                        <h3 className="font-black text-lg uppercase tracking-wider text-brand-dark drop-shadow-sm">Historial</h3>
                                    </div>
                                    
                                    <div className="max-h-[300px] overflow-y-auto hide-scroll pr-1 pb-4">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                                            {history.length === 0 ? (
                                                <div className="bg-white/40 p-4 rounded-xl border border-brand-dark/10 text-center shadow-sm col-span-full">
                                                    <p className="font-bold text-brand-dark/60 text-[10px]">Aún no hay registros en tu historial.</p>
                                                </div>
                                            ) : (
                                                history.map((item, idx) => {
                                                    const isApproved = String(item.Estado).toLowerCase() === 'aprobado';
                                                    const isRejected = String(item.Estado).toLowerCase() === 'rechazado';
                                                    const statusColor = isApproved ? 'bg-green-500' : isRejected ? 'bg-red-500' : 'bg-orange-500';
                                                    const statusBadgeColor = isApproved ? 'bg-green-500/20 text-green-400 border-green-500/30' : isRejected ? 'bg-red-500/20 text-red-400 border-red-500/30' : 'bg-orange-500/20 text-orange-400 border-orange-500/30';
                                                    
                                                    return (
                                                        <div key={idx} onClick={() => setSelectedHistoryItem(item)} className="bg-brand-dark text-brand-bg1 rounded-xl p-3 shadow-sm border border-brand-bg2/20 flex flex-col gap-1.5 relative overflow-hidden group hover:scale-[1.02] transition-transform cursor-pointer">
                                                            <div className={`absolute left-0 top-0 w-1.5 h-full ${statusColor}`}></div>
                                                            
                                                            <div className="flex justify-between items-center pl-2">
                                                                <h4 className="font-black text-[10px] sm:text-xs uppercase leading-tight pr-2 drop-shadow-sm truncate">{item.Reto}</h4>
                                                                <span className={`text-[8px] font-black uppercase px-1.5 py-0.5 rounded shadow-sm whitespace-nowrap tracking-widest border ${statusBadgeColor}`}>
                                                                    {item.Estado}
                                                                </span>
                                                            </div>
                                                            
                                                            <div className="pl-2 flex flex-col gap-1">
                                                                <div className="flex items-center gap-2 text-[9px] sm:text-[10px]">
                                                                    <span className="font-black text-brand-bg1/50 flex items-center gap-1"><Clock className="w-2.5 h-2.5"/> {formatearFecha(item.Fecha)}</span>
                                                                    {isApproved && item.Puntos > 0 && <span className="font-black text-green-400 flex items-center gap-0.5"><Trophy className="w-2.5 h-2.5"/> +{item.Puntos} Pts</span>}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* RANKING GLOBAL */}
                        {user && currentView === 'ranking' && (
                            <div className="animate-slide-up space-y-6">
                                <div className="px-2 flex items-center justify-between mt-4">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-brand-dark p-3 rounded-xl shadow-lg"><Trophy className="w-8 h-8 text-yellow-400" /></div>
                                        <div>
                                            <h2 className="text-3xl font-black uppercase leading-none text-brand-dark">Ranking</h2>
                                            <p className="text-xs font-bold text-brand-dark/50 tracking-wider">Top de Atletas Elementa</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setCurrentView('home')} className="bg-white/50 p-3 rounded-full hover:bg-white text-brand-dark shadow-sm"><X className="w-5 h-5"/></button>
                                </div>

                                <div className="glass-card rounded-[1.5rem] p-4 sm:p-6 border border-white/40 shadow-sm">
                                    <div className="space-y-3">
                                        {[...rankingList].sort((a,b) => b.puntos - a.puntos).map((r, i) => {
                                            const isMe = r.nombre === (`${user.name || ''} ${user.apellidos || ''}`).trim();
                                            return (
                                                <div key={i} className={`flex items-center justify-between p-4 rounded-2xl transition-all ${isMe ? 'bg-brand-dark text-brand-bg1 shadow-lg scale-[1.02] ring-2 ring-brand-dark/20' : 'bg-white/60 text-brand-dark border border-brand-dark/10'}`}>
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-8 h-8 flex items-center justify-center font-black text-sm rounded-full ${i === 0 ? 'bg-yellow-400 text-yellow-900 shadow-md' : (i === 1 ? 'bg-gray-300 text-gray-800' : (i === 2 ? 'bg-orange-300 text-orange-900' : 'bg-black/10'))}`}>
                                                            {i + 1}
                                                        </div>
                                                        <span className="font-black text-sm uppercase tracking-wide">{r.nombre}</span>
                                                    </div>
                                                    <div className="flex flex-col items-end">
                                                        <span className="font-black text-lg leading-none">{r.puntos}</span>
                                                        <span className="text-[8px] font-black uppercase tracking-widest opacity-60">Pts</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {rankingList.length === 0 && <p className="text-center font-bold text-sm text-brand-dark/50 py-4">No hay datos de ranking aún.</p>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* WOD Y RETOS */}
                        {user && currentView === 'wod' && (
                            <div className="animate-slide-up space-y-6">
                                <div className="px-2 mt-4">
                                    <h2 className="text-4xl font-black uppercase leading-none mt-1">WOD</h2>
                                    <p className="text-sm font-bold text-brand-dark/50 mt-2">Entrenamientos y Retos</p>
                                </div>

                                {dataLoading ? <div className="text-center py-10 font-bold animate-pulse text-brand-dark/50">Cargando datos...</div> : (
                                    <div className="space-y-6">
                                        {(!wodsList || wodsList.length === 0) ? (
                                            <div className="bg-white/40 p-6 rounded-2xl border border-brand-dark/10 text-center shadow-sm">
                                                <Calendar className="w-10 h-10 mx-auto text-brand-dark/30 mb-3" />
                                                <p className="font-bold text-brand-dark/60 text-sm">No hay entrenamientos cargados.</p>
                                            </div>
                                        ) : (
                                            wodsList.map((wod, idx) => {
                                                return (
                                                    <div key={idx} className="glass-card rounded-[1.5rem] p-6 border border-brand-dark/10 shadow-md relative overflow-hidden group">
                                                        <div className="absolute top-0 left-0 w-2 h-full bg-brand-dark"></div>
                                                        <div className="flex justify-between items-start mb-4">
                                                            <h3 className="text-2xl font-black uppercase text-brand-dark">{getProp(wod, 'Titulo') || 'WOD'}</h3>
                                                            <span className="text-xs font-bold text-brand-dark/50 bg-white/50 px-3 py-1 rounded-full">{formatearFecha(getProp(wod, 'Fecha'))}</span>
                                                        </div>
                                                        <div className="bg-white/40 p-5 rounded-xl font-medium text-brand-dark/90 whitespace-pre-wrap leading-relaxed border border-white/50 text-sm">
                                                            {getProp(wod, 'Descripcion') || 'Sin descripción'}
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}

                                        <div className="pt-4 border-t-2 border-brand-dark/10">
                                            <h3 className="font-black text-xl uppercase mb-4 px-2 flex items-center gap-2"><Trophy className="w-5 h-5"/> Retos Disponibles</h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                {retosList?.map((reto, idx) => {
                                                    if(!reto) return null;
                                                    const titulo = String(getProp(reto, 'Titulo') || '').toUpperCase();
                                                    const isAutoReto = titulo.includes('VIDEO') || titulo.includes('NIVEL') || titulo.includes('BANDA') || titulo.includes('MARCA');
                                                    
                                                    return (
                                                        <div key={idx} className="bg-white/60 p-5 rounded-2xl border border-brand-dark/5 flex flex-col h-full shadow-sm">
                                                            <div className="flex justify-between items-start mb-2">
                                                                <h4 className="font-black uppercase text-sm leading-tight text-brand-dark pr-2">{getProp(reto, 'Titulo') || 'Reto'}</h4>
                                                                <span className="bg-green-100 text-green-700 font-black text-[10px] px-2 py-1 rounded-full uppercase tracking-wider border border-green-200 shrink-0">+{getProp(reto, 'Puntos') || 0} Pts</span>
                                                            </div>
                                                            <p className="text-xs font-bold text-brand-dark/60 mb-4 flex-1 leading-relaxed">{getProp(reto, 'Descripcion') || ''}</p>
                                                            {isAutoReto ? (
                                                                <div className="w-full bg-orange-100/50 text-orange-800/70 py-2.5 rounded-xl font-black text-[9px] uppercase text-center border border-orange-200/50 flex flex-col items-center justify-center gap-1">
                                                                    <CheckCircle className="w-4 h-4"/>
                                                                    Asignación Automática desde Home/Videos
                                                                </div>
                                                            ) : (
                                                                <button onClick={() => setUploadingReto({ Titulo: getProp(reto, 'Titulo'), Puntos: getProp(reto, 'Puntos') })} className="w-full bg-brand-dark text-brand-bg1 py-2.5 rounded-xl font-black text-[10px] uppercase shadow-md flex items-center justify-center gap-2 hover:scale-[1.02] transition-transform">
                                                                    <Upload className="w-4 h-4"/> Subir Evidencia
                                                                </button>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ACADEMIA DE VIDEOS */}
                        {user && currentView === 'academy' && (
                            <div className="animate-slide-up space-y-6">
                                <div className="px-2 mt-4">
                                    <h2 className="text-4xl font-black uppercase leading-none mt-1">Academia</h2>
                                    <p className="text-sm font-bold text-brand-dark/50 mt-2">Domina tu técnica con nuestros videos</p>
                                </div>

                                                                                </div>
                                                                            )}

                                                                    </div>

                                                            })}

                                                    )}
                                                </div>

                                    </div>

                            </div>

                                                    </div>
                                                </div>

                                                                <h5 className="font-black text-xs text-brand-dark truncate">{getProp(post, 'Titulo')}</h5>

                                                <div><label className="block text-[10px] font-black uppercase mb-1 ml-1 text-brand-dark">Fecha</label><input type="date" name="Fecha" defaultValue={editingWOD && getProp(editingWOD, 'Fecha') ? new Date(getProp(editingWOD, 'Fecha')).toISOString().split('T')[0] : ''} required className="w-full p-3 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-brand-dark shadow-sm" /></div>

                                            <div><label className="block text-[10px] font-black uppercase mb-1 ml-1 text-brand-dark">Descripción del WOD</label><textarea name="Descripcion" defaultValue={editingWOD ? getProp(editingWOD, 'Descripcion') : ''} required rows="6" className="w-full p-3 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-brand-dark shadow-sm whitespace-pre-wrap"></textarea></div>

                                                                <h5 className="font-black text-xs text-brand-dark truncate">{getProp(wod, 'Titulo')}</h5>
                                                                <span className="text-[9px] font-bold text-brand-dark/50">{formatearFecha(getProp(wod, 'Fecha'))}</span>
                                                            </div>
                                                            <button onClick={() => setEditingWOD(wod)} className="shrink-0 bg-brand-dark text-brand-bg1 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase shadow hover:scale-105">Editar</button>

                                                    ))}
                                                    {(!wodsList || wodsList.length === 0) && <p className="text-xs font-bold text-brand-dark/50 text-center">No hay WODs registrados.</p>}

                                            </div>
                                        )}
                                    </div>

                                            <div className="space-y-3">

                                                    if (!row) return null;
                                                    const nombreCompleto = `${getProp(row, 'Nombres') || ''} ${getProp(row, 'Apellidos') || ''}`.trim() || getProp(row, 'Correo') || 'Atleta Sin Nombre';
                                                    const caducidad = getProp(row, 'Caducidad') || getProp(row, 'Fecha de Caducidad') || '';
                                                    const estado = String(getProp(row, 'Estado') || '').trim().toLowerCase() === 'activo' ? 'Activo' : 'Inactivo';

                                                    return (
                                                        <div key={idx} className="bg-white/60 p-4 rounded-2xl border border-brand-dark/10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-sm hover:bg-white/80 transition-colors">

                                                                <div className="flex items-center gap-2">
                                                                    <h4 className="font-black text-brand-dark uppercase text-sm">{nombreCompleto}</h4>

                                                                </div>
                                                                <div className="flex flex-wrap gap-2 mt-2 items-center">
                                                                    <span className={`text-[10px] font-black uppercase px-2 py-1 rounded ${estado === 'Activo' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{estado}</span>
                                                                    <span className="text-[10px] font-bold text-brand-dark/70 bg-black/5 px-2 py-1 rounded border border-black/5">{getProp(row, 'Plan') || 'Sin Plan'}</span>
                                                                    <span className={`text-[10px] font-black uppercase px-2 py-1 bg-white rounded border border-brand-dark/5 ${infoDias.color}`}>{infoDias.texto} ({formatearFecha(caducidad)})</span>
                                                                </div>
                                                            </div>
                                                            <button onClick={() => setEditingPayment(row)} className="shrink-0 w-full sm:w-auto bg-brand-dark text-brand-bg1 px-4 py-2.5 rounded-xl font-black text-[10px] uppercase shadow-md hover:scale-105 flex items-center justify-center gap-2"><Activity className="w-4 h-4"/> Editar Estado</button>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {adminTab === 'evidencias' && (
                                    <div className="glass-card p-4 sm:p-6 rounded-[2rem] border border-white/40">

                                        {successMsg && <div className="bg-green-500 text-white p-3 rounded-xl mb-4 text-xs font-bold text-center shadow-md animate-pulse">{successMsg}</div>}

                                                    <h4 className="text-[10px] font-black uppercase text-brand-dark/50 mb-1">Detalle de Solicitud</h4>
                                                    <div className="space-y-1.5 max-h-40 overflow-y-auto hide-scroll p-3 bg-white/50 rounded-xl border border-brand-dark/10">

                                                                <p key={j} className="text-xs font-black text-brand-dark uppercase border-b border-brand-dark/5 pb-1 last:border-0">{line}</p>
