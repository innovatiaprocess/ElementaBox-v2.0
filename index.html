                                            <div className="space-y-3">
                                                {(!adminEvidencias || adminEvidencias.length === 0) ? (
                                                    <p className="text-center font-bold text-brand-dark/50 py-8 bg-white/40 rounded-2xl border border-white">No hay evidencias pendientes por revisar.</p>
                                                ) : (
                                                    adminEvidencias.map((ev, i) => {
                                                        if (!ev) return null;
                                                        return (
                                                            <div key={i} className="bg-white/60 p-4 rounded-2xl border border-brand-dark/10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-sm">
                                                                <div className="flex-1 min-w-0 pr-4">
                                                                    <div className="flex items-center gap-2 mb-1.5">
                                                                        <span className={`px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider bg-orange-100 text-orange-700`}>{getProp(ev, 'Estado') || 'Pendiente'}</span>
                                                                        <span className="text-[10px] font-black uppercase text-brand-dark/50">{formatearFecha(getProp(ev, 'Fecha'))}</span>
                                                                    </div>
                                                                    <div className="space-y-1 mb-1.5">
                                                                        {String(getProp(ev, 'Reto') || 'Evidencia').split(' | ').slice(0, 2).map((line, j) => {
                                                                            return (
                                                                                <p key={j} className="font-black text-brand-dark text-xs leading-tight uppercase truncate">{line}</p>
                                                                            );
                                                                        })}
                                                                        {String(getProp(ev, 'Reto') || '').split(' | ').length > 2 && <p className="text-[9px] font-bold text-brand-dark/40 italic">... y más cambios (+)</p>}
                                                                    </div>
                                                                    <p className="text-[10px] font-bold text-brand-dark/60 flex items-center gap-1"><Users className="w-3 h-3"/> {getProp(ev, 'Correo')}</p>
                                                                </div>
                                                                <button onClick={() => setAdminEvalEvidencia(ev)} className="w-full sm:w-auto shrink-0 bg-brand-dark text-brand-bg1 px-4 py-2.5 rounded-xl font-black text-[10px] uppercase shadow-md hover:scale-105">Evaluar Prueba</button>
                                                            </div>
                                                        );
                                                    })
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* MODAL: EDITAR PERFIL INTERNO */}
                        {showProfileModal && user && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-fade-in">
                                <div className="bg-[#f0e3d1] w-full max-w-lg rounded-[2.5rem] p-6 shadow-2xl relative animate-zoom-in border border-white/20 max-h-[90vh] flex flex-col">
                                    <button type="button" onClick={() => setShowProfileModal(false)} className="absolute top-4 right-4 z-10 bg-brand-dark/10 text-brand-dark p-2 rounded-full hover:bg-brand-dark/20"><X className="w-4 h-4" /></button>
                                    
                                    <div className="mb-4 text-center">
                                        <h3 className="text-2xl font-black uppercase text-brand-dark">Mi Perfil</h3>
                                        <p className="text-[10px] font-bold text-brand-dark/60 mt-1 uppercase tracking-wider">Completa tu información como Atleta</p>
                                    </div>

                                    <div className="flex-1 overflow-y-auto hide-scroll pr-1 pb-4">
                                        {successMsg && <div className="bg-green-500 text-white p-3 rounded-xl mb-4 text-xs font-bold text-center shadow-md animate-pulse">{successMsg}</div>}
                                        {errorMsg && <div className="bg-red-500 text-white p-3 rounded-xl mb-4 text-xs font-bold text-center shadow-md">{errorMsg}</div>}
                                        
                                        <form onSubmit={handleUpdateProfile} className="space-y-4">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Nombres</label><input type="text" name="nombres" defaultValue={user.name} required pattern="^[A-Za-zÀ-ÿ\s]+$" className="w-full p-3.5 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Apellidos</label><input type="text" name="apellidos" defaultValue={user.apellidos} required pattern="^[A-Za-zÀ-ÿ\s]+$" className="w-full p-3.5 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="block text-[10px] font-black uppercase mb-1 ml-1 text-brand-dark">Cédula</label><input type="number" name="cedula" defaultValue={user.cedula} required min="10000" className="w-full p-3.5 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Teléfono</label><input type="tel" name="telefono" defaultValue={user.telefono} required pattern="[0-9]{7,15}" className="w-full p-3.5 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="block text-[10px] font-black uppercase mb-1 ml-1 text-brand-dark">EPS</label><input type="text" name="eps" defaultValue={user.eps} required pattern="^[A-Za-zÀ-ÿ\s0-9]+$" className="w-full p-3.5 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Fecha Nacimiento</label><input type="date" name="fechaNac" defaultValue={user.fechaNac ? new Date(user.fechaNac).toISOString().split('T')[0] : ''} required max={new Date().toISOString().split("T")[0]} className="w-full p-3.5 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                            </div>
                                            
                                            <div className="p-4 bg-brand-dark/5 rounded-xl border border-brand-dark/10 space-y-4 mt-4">
                                                <p className="text-[10px] font-black uppercase text-brand-dark/50 flex items-center gap-1"><AlertCircle className="w-3 h-3"/> En caso de emergencia</p>
                                                <input type="text" name="contactoEmergencia" defaultValue={user.contactoEmergencia} required pattern="^[A-Za-zÀ-ÿ\s]+$" placeholder="Nombre del contacto" className="w-full p-3.5 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-brand-dark text-sm" />
                                                <div className="grid grid-cols-2 gap-4">
                                                    <input type="text" name="parentesco" defaultValue={user.parentesco} required pattern="^[A-Za-zÀ-ÿ\s]+$" placeholder="Parentesco (Ej: Madre)" className="w-full p-3.5 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-brand-dark text-sm" />
                                                    <input type="tel" name="numContactoEmergencia" defaultValue={user.numContactoEmergencia} required pattern="[0-9]{7,15}" placeholder="Teléfono" className="w-full p-3.5 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-brand-dark text-sm" />
                                                </div>
                                            </div>

                                            <button type="submit" disabled={loading} className="w-full bg-brand-dark text-brand-bg1 p-4 rounded-xl font-black text-sm uppercase tracking-wider mt-4 hover:scale-[1.02] transition-transform shadow-xl">
                                                {loading ? 'Guardando...' : 'Guardar Perfil'}
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* OTROS MODALES EXTRAS (UPLOAD EVIDENCIA, VER VIDEO, ETC) */}
                        {uploadingReto && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-fade-in">
                                <div className="bg-[#f0e3d1] w-full max-w-sm rounded-[2.5rem] p-6 shadow-2xl relative animate-zoom-in border border-white/20">
                                    <button type="button" onClick={() => {setUploadingReto(null); setPreviewFiles([]); setErrorMsg(''); setSuccessMsg('');}} className="absolute top-4 right-4 z-10 bg-brand-dark/10 text-brand-dark p-2 rounded-full hover:bg-brand-dark/20"><X className="w-4 h-4" /></button>
                                    <h3 className="text-xl font-black uppercase mb-2 text-center text-brand-dark pr-6">Enviar Evidencia</h3>
                                    <p className="text-xs font-bold text-brand-dark/60 mb-6 text-center leading-tight uppercase">{uploadingReto.Titulo}</p>
                                    
                                    {successMsg && <div className="bg-yellow-500 text-white p-3 rounded-xl mb-4 text-xs font-bold text-center shadow-md animate-pulse">{successMsg}</div>}
                                    {errorMsg && <div className="bg-red-500 text-white p-3 rounded-xl mb-4 text-xs font-bold text-center shadow-md">{errorMsg}</div>}

                                    <form onSubmit={handleEvidenceSubmit} className="space-y-4">
                                        {previewFiles.length > 0 ? (
                                            <div className="w-full flex flex-col items-center gap-3">
                                                <div className="w-full h-32 bg-black/5 rounded-2xl border border-black/10 overflow-x-auto flex items-center justify-start p-2 gap-2 relative group hide-scroll">
                                                    {previewFiles.map((pf, i) => {
                                                        return (
                                                            <div key={i} className="min-w-[100px] h-full relative rounded-xl overflow-hidden shrink-0 bg-black shadow-sm">
                                                                {pf.type.startsWith('video/') ? (
                                                                    <video src={pf.url} className="w-full h-full object-cover"></video>
                                                                ) : (
                                                                    <img src={pf.url} className="w-full h-full object-cover" />
                                                                )}
                                                                <button type="button" onClick={() => setPreviewFiles(prev => prev.filter((_, idx) => idx !== i))} className="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full shadow-md"><X className="w-3 h-3"/></button>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                                <div className="flex justify-between w-full">
                                                    <button type="button" onClick={() => document.getElementById('galleryInputMulti').click()} className="text-brand-dark font-black text-[10px] uppercase px-3 py-1.5 rounded-lg border border-brand-dark/20 hover:bg-white/50">+ Agregar más</button>
                                                    <button type="button" onClick={() => setPreviewFiles([])} className="bg-black/10 text-brand-dark/60 font-black text-[10px] uppercase px-3 py-1.5 rounded-lg">Limpiar Todo</button>
                                                </div>
                                                <input type="file" id="galleryInputMulti" accept="image/*,video/*" multiple onChange={handleFileChange} className="hidden" />
                                            </div>
                                        ) : (
                                            <div className="flex gap-3 w-full">
                                                <button type="button" onClick={() => document.getElementById('cameraInput').click()} className="flex-1 h-32 rounded-2xl bg-white/60 border-2 border-brand-dark/20 hover:border-brand-dark transition-colors flex flex-col items-center justify-center gap-2 font-black text-brand-dark cursor-pointer shadow-sm">
                                                    <Camera className="w-8 h-8 opacity-70" />
                                                    <span className="text-[10px] uppercase tracking-wider">Tomar Foto</span>
                                                </button>
                                                <button type="button" onClick={() => document.getElementById('galleryInput').click()} className="flex-1 h-32 rounded-2xl bg-white/60 border-2 border-brand-dark/20 hover:border-brand-dark transition-colors flex flex-col items-center justify-center gap-2 font-black text-brand-dark cursor-pointer shadow-sm">
                                                    <Upload className="w-8 h-8 opacity-70" />
                                                    <span className="text-[10px] uppercase tracking-wider text-center">Adjuntar<br/>Imágenes</span>
                                                </button>
                                                <input type="file" id="cameraInput" accept="image/*" capture="environment" onChange={handleFileChange} className="hidden" />
                                                <input type="file" id="galleryInput" accept="image/*" multiple onChange={handleFileChange} className="hidden" />
                                            </div>
                                        )}
                                        
                                        <button type="submit" disabled={loading || previewFiles.length === 0} className="w-full bg-brand-dark text-brand-bg1 p-4 rounded-xl font-black uppercase hover:scale-105 shadow-xl transition-transform disabled:opacity-50 mt-4">{loading ? 'Procesando...' : 'Enviar a Revisión'}</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {editingPayment && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-fade-in">
                                <div className="bg-[#f0e3d1] w-full max-w-sm rounded-[2.5rem] p-6 shadow-2xl relative animate-zoom-in border border-white/20">
                                    <button type="button" onClick={() => setEditingPayment(null)} className="absolute top-4 right-4 bg-brand-dark/10 text-brand-dark p-2 rounded-full hover:bg-brand-dark/20"><X className="w-4 h-4" /></button>
                                    <h3 className="text-xl font-black uppercase mb-1 text-center text-brand-dark flex items-center justify-center gap-2"><Activity className="w-5 h-5"/> Estado del Atleta</h3>
                                    <p className="font-bold text-brand-dark/60 mb-6 text-center text-xs uppercase">{getProp(editingPayment, 'Nombres') ? `${getProp(editingPayment, 'Nombres')} ${getProp(editingPayment, 'Apellidos') || ''}` : getProp(editingPayment, 'Correo')}</p>
                                    
                                    {successMsg && <div className="bg-green-500 text-white p-3 rounded-xl mb-4 text-xs font-bold text-center shadow-md">{successMsg}</div>}
                                    {errorMsg && <div className="bg-red-500 text-white p-3 rounded-xl mb-4 text-xs font-bold text-center shadow-md">{errorMsg}</div>}

                                    <form onSubmit={handlePaymentUpdate} className="space-y-4">
                                        <div>
                                            <label className="block text-[10px] font-black uppercase mb-1 text-brand-dark">Plan Suscrito</label>
                                            <select name="Plan" defaultValue={getProp(editingPayment, 'Plan')} className="w-full p-3 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-sm text-brand-dark border border-brand-dark/5 shadow-inner">
                                                <option value="Plan Full - Elementa">Plan Full - Elementa</option>
                                                <option value="Plan 12 Clases - Elementa">Plan 12 Clases - Elementa</option>
                                                <option value="Plan Mañanas - Elementa">Plan Mañanas - Elementa</option>
                                                <option value="Plan Estudiantes - Elementa">Plan Estudiantes - Elementa</option>
                                                <option value="Plan Parejas - Elementa">Plan Parejas - Elementa</option>
                                                <option value="Plan Semestral - Elementa">Plan Semestral - Elementa</option>
                                                <option value="Plan Anualidad - Elementa">Plan Anualidad - Elementa</option>
                                            </select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-[10px] font-black uppercase mb-1 text-brand-dark">Fecha de Ingreso</label>
                                                <input type="date" name="Fecha Ingreso" defaultValue={getProp(editingPayment, 'Fecha Ingreso') || getProp(editingPayment, 'Ingreso') ? new Date(getProp(editingPayment, 'Fecha Ingreso') || getProp(editingPayment, 'Ingreso')).toISOString().split('T')[0] : ''} className="w-full p-3 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-sm text-brand-dark border border-brand-dark/5 shadow-inner" />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-black uppercase mb-1 text-brand-dark">Fecha de Vencimiento</label>
                                                <input type="date" name="Fecha de Caducidad" defaultValue={getProp(editingPayment, 'Caducidad') || getProp(editingPayment, 'Fecha de Caducidad') ? new Date(getProp(editingPayment, 'Caducidad') || getProp(editingPayment, 'Fecha de Caducidad')).toISOString().split('T')[0] : ''} className="w-full p-3 rounded-xl bg-white/60 focus:bg-white outline-none font-bold text-sm text-brand-dark border border-brand-dark/5 shadow-inner" />
                                            </div>
                                        </div>
                                        <div className="mt-6 pt-4 border-t border-brand-dark/10">
                                            <button type="submit" disabled={loading} className="w-full bg-brand-dark text-brand-bg1 p-4 rounded-xl font-black uppercase hover:scale-105 shadow-xl transition-transform text-xs">{loading ? 'Guardando...' : 'Guardar Cambios'}</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {selectedPost && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-0 sm:p-6 modal-overlay animate-fade-in" onClick={() => setSelectedPost(null)}>
                                <div className="bg-brand-bg1 w-full h-full sm:max-h-[90vh] sm:max-w-4xl sm:rounded-[2.5rem] overflow-hidden shadow-2xl relative animate-zoom-in flex flex-col border border-white/10" onClick={e => e.stopPropagation()}>
                                    <button onClick={() => setSelectedPost(null)} className="absolute top-4 right-4 z-30 bg-black/40 backdrop-blur-md text-white p-2 rounded-full shadow-lg hover:bg-black transition-colors"><X className="w-6 h-6" /></button>
                                    
                                    <div className="flex-1 overflow-y-auto hide-scroll bg-brand-bg1">
                                        {selectedPost.parsedImage && (
                                            <div className="w-full relative shadow-md bg-brand-dark flex justify-center">
                                                <img src={selectedPost.parsedImage} className="w-full h-auto max-h-[none] object-contain" alt="Detalle" />
                                            </div>
                                        )}
                                        <div className={`p-6 sm:p-12 ${!selectedPost.parsedImage ? 'pt-20' : ''}`}>
                                            <div className="flex gap-3 mb-5">
                                                <span className="bg-brand-dark text-brand-bg1 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest shadow-sm">{getProp(selectedPost, 'Etiqueta') || 'Evento'}</span>
                                                <span className="text-brand-dark/60 text-xs font-bold uppercase py-1.5">{formatearFecha(getProp(selectedPost, 'Fecha'))}</span>
                                            </div>
                                            <h2 className="text-3xl sm:text-5xl font-black text-brand-dark leading-tight mb-8 drop-shadow-sm">{getProp(selectedPost, 'Titulo')}</h2>
                                            <div className="text-brand-dark/90 font-medium leading-relaxed whitespace-pre-wrap text-base sm:text-lg">
                                                {getProp(selectedPost, 'Contenido') || getProp(selectedPost, 'Descripcion')}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {selectedVideo && (() => {
                            return (
                                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-fade-in" onClick={() => setSelectedVideo(null)}>
                                    <div className="bg-black w-full max-w-4xl rounded-3xl overflow-hidden shadow-2xl relative aspect-video flex flex-col" onClick={e => e.stopPropagation()}>
                                        <div className="absolute top-4 right-4 z-30 flex gap-2">
                                            {!selectedVideo.isCompleted ? (
                                                <button onClick={completeVideoChallenge} disabled={loading} className="bg-orange-500/90 text-white px-4 py-2 rounded-full font-black text-[10px] uppercase tracking-wider hover:bg-orange-600 backdrop-blur-md shadow-lg">{loading ? '...' : 'Terminé de verlo (+ Pts)'}</button>
                                            ) : (
                                                <div className="bg-green-500/90 text-white px-4 py-2 rounded-full font-black text-[10px] uppercase tracking-wider backdrop-blur-md shadow-lg flex items-center gap-1"><CheckCircle className="w-3 h-3"/> Visto (Puntos Reclamados)</div>
                                            )}
                                            <button onClick={() => setSelectedVideo(null)} className="bg-black/50 text-white p-2 rounded-full hover:bg-black transition-colors border border-white/20"><X className="w-5 h-5" /></button>
                                        </div>
                                        <div className="flex-1 w-full h-full relative">
                                            {selectedVideo.type === 'youtube' && <iframe src={`https://www.youtube.com/embed/${selectedVideo.id}?autoplay=1&rel=0&modestbranding=1`} className="absolute inset-0 w-full h-full border-0" allow="autoplay; fullscreen"></iframe>}
                                            {selectedVideo.type === 'drive' && <iframe src={`https://drive.google.com/file/d/${selectedVideo.id}/preview`} className="absolute inset-0 w-full h-full border-0" allow="autoplay; fullscreen"></iframe>}
                                            {!selectedVideo.type && <div className="absolute inset-0 flex items-center justify-center text-white/50 font-bold text-sm">Video no soportado (verificar link en Excel).</div>}
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}

                        {selectedHistoryItem && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-fade-in" onClick={() => setSelectedHistoryItem(null)}>
                                <div className="bg-[#f0e3d1] w-full max-w-md rounded-[2.5rem] p-6 shadow-2xl relative animate-zoom-in border border-white/20" onClick={e => e.stopPropagation()}>
                                    <button type="button" onClick={() => setSelectedHistoryItem(null)} className="absolute top-4 right-4 bg-brand-dark/10 text-brand-dark p-2 rounded-full hover:bg-brand-dark/20 transition-colors"><X className="w-4 h-4" /></button>
                                    
                                    <div className="flex items-center gap-3 mb-5 border-b border-brand-dark/10 pb-4 pr-6">
                                        <div className={`w-10 h-10 shrink-0 rounded-full flex items-center justify-center shadow-inner
                                            ${String(selectedHistoryItem.Estado).toLowerCase() === 'aprobado' ? 'bg-green-100 text-green-600' : 
                                              String(selectedHistoryItem.Estado).toLowerCase() === 'rechazado' ? 'bg-red-100 text-red-600' : 
                                              'bg-orange-100 text-orange-600'}`}>
                                            {String(selectedHistoryItem.Estado).toLowerCase() === 'aprobado' ? <CheckCircle className="w-5 h-5"/> : 
                                             String(selectedHistoryItem.Estado).toLowerCase() === 'rechazado' ? <X className="w-5 h-5"/> : 
                                             <Clock className="w-5 h-5"/>}
                                        </div>
                                        <div>
                                            <h3 className="text-lg font-black uppercase text-brand-dark leading-none tracking-tight">Detalle de Solicitud</h3>
                                            <p className="text-[10px] font-bold text-brand-dark/50 mt-1 uppercase">{formatearFecha(selectedHistoryItem.Fecha)}</p>
                                        </div>
                                    </div>

                                    <div className="space-y-4 max-h-[50vh] overflow-y-auto hide-scroll pr-2">
                                        <div>
                                            <span className="text-[9px] font-black uppercase text-brand-dark/50 block mb-1.5">Estado de Revisión</span>
                                            <span className={`inline-block px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-wider shadow-sm border
                                                ${String(selectedHistoryItem.Estado).toLowerCase() === 'aprobado' ? 'bg-green-500/20 text-green-700 border-green-500/30' : 
                                                  String(selectedHistoryItem.Estado).toLowerCase() === 'rechazado' ? 'bg-red-500/20 text-red-700 border-red-500/30' : 
                                                  'bg-orange-500/20 text-orange-700 border-orange-500/30'}`}>
                                                {selectedHistoryItem.Estado}
                                            </span>
                                        </div>

                                        <div>
                                            <span className="text-[9px] font-black uppercase text-brand-dark/50 block mb-2">Desglose de Cambios / Reto</span>
                                            <div className="space-y-2">
                                                {String(selectedHistoryItem.Reto).split(' | ').map((line, i) => {
                                                    return (
                                                        <div key={i} className="bg-white/60 p-3 rounded-xl border border-brand-dark/5 shadow-sm">
                                                            <p className="text-xs font-black text-brand-dark uppercase leading-snug">{line}</p>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        {selectedHistoryItem.Puntos > 0 && (
                                            <div className="bg-green-50 p-3 rounded-xl border border-green-100 flex items-center justify-between shadow-sm">
                                                <span className="text-[10px] font-black uppercase text-green-800/60">Puntos Asignados</span>
                                                <span className="font-black text-green-600 text-lg flex items-center gap-1"><Trophy className="w-4 h-4"/> +{selectedHistoryItem.Puntos}</span>
                                            </div>
                                        )}

                                        {selectedHistoryItem.Observacion && (
                                            <div>
                                                <span className="text-[9px] font-black uppercase text-brand-dark/50 block mb-1">Comentario del Administrador</span>
                                                <div className="bg-black/5 p-3.5 rounded-xl border border-black/5 relative">
                                                    <div className="absolute left-0 top-0 bottom-0 w-1 bg-brand-dark/20 rounded-l-xl"></div>
                                                    <p className="text-xs font-bold text-brand-dark/80 italic leading-relaxed pl-2">
                                                        "{selectedHistoryItem.Observacion}"
                                                    </p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                    {user && currentView !== 'login' && currentView !== 'register' && <BottomNav />}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
